<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>1:64 Cray! Video Browser</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #181b22;
    --panel-2: #20242d;
    --border: #2a2f3a;
    --text: #e6e8ec;
    --muted: #8a93a3;
    --accent: #4f8cff;
    --rumble: #85c742;
    --youtube: #ff0033;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: grid;
    grid-template-columns: 380px 1fr;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .sidebar-header {
    padding: 14px 16px 10px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    margin: 0 0 8px;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
  }
  #search {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  .count {
    margin-top: 6px;
    font-size: 11px;
    color: var(--muted);
  }

  #list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .card {
    display: flex;
    gap: 10px;
    padding: 8px;
    border-radius: 8px;
    cursor: pointer;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }
  .card:hover { background: var(--panel-2); }
  .card.active {
    background: var(--panel-2);
    border-color: var(--accent);
  }

  .thumb-wrap {
    position: relative;
    width: 110px;
    height: 62px;
    flex-shrink: 0;
    background: #000;
    border-radius: 4px;
    overflow: hidden;
  }
  .thumb-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  /* Rumble-only fallback when there's no YouTube thumb available */
  .thumb-wrap.placeholder {
    background: linear-gradient(135deg, #2a3a18 0%, #4a6324 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d4ed9e;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .card .meta { min-width: 0; flex: 1; }
  .card .title {
    font-size: 13px;
    line-height: 1.3;
    margin: 0 0 4px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card .ids {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 6px;
  }
  .badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
  }
  .badge.yt { background: var(--youtube); color: #fff; }
  .badge.rb { background: var(--rumble); color: #000; }

  /* Main */
  main {
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
  }
  .player-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .player-header h2 {
    margin: 0;
    font-size: 16px;
    font-weight: 500;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .toggle {
    display: flex;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .toggle button {
    background: transparent;
    border: none;
    color: var(--muted);
    padding: 6px 14px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 500;
  }
  .toggle button:hover:not(:disabled) { color: var(--text); }
  .toggle button.active { background: var(--accent); color: #fff; }
  .toggle button:disabled { opacity: 0.35; cursor: not-allowed; }

  .player-wrap {
    flex: 1;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    min-height: 0;
  }
  .player-frame {
    width: 100%;
    height: 100%;
    max-width: 1280px;
    aspect-ratio: 16 / 9;
    max-height: 100%;
    background: #000;
    border: none;
    border-radius: 4px;
  }
  .empty {
    color: var(--muted);
    font-size: 14px;
    text-align: center;
  }

  @media (max-width: 760px) {
    body { grid-template-columns: 1fr; grid-template-rows: 40vh 1fr; }
    aside { border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
  <aside>
    <div class="sidebar-header">
      <h1><a href="/"><img src="/assets/img/164_logo.png" alt="164Cray" class="img-fluid" style="max-height: 100px;"></a></h1>
      <input id="search" type="search" placeholder="Search titles…" />
      <div class="count" id="count"></div>
    </div>
    <div id="list"></div>
  </aside>

  <main>
    <div class="player-header">
      <h2 id="title">Pick a video to start</h2>
      <div class="toggle" id="source-toggle">
        <button data-src="youtube">YouTube</button>
        <button data-src="rumble">Rumble</button>
      </div>
    </div>
    <div class="player-wrap" id="player">
      <div class="empty">Select a video from the list →</div>
    </div>
  </main>

  <script src="/164cray/app.js"></script>
</body>
</html>
