<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Drone Wars - Babylon.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    #renderCanvas { width: 100%; height: 100vh; touch-action: none; display: block; }
    #loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #111; color: #fff;
      font-size: 22px; z-index: 100; flex-direction: column; gap: 12px;
    }
    #loading.hidden { display: none; }
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px; pointer-events: none; z-index: 50;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 16px; left: 7px; top: 0; }
    #crosshair::after  { width: 16px; height: 2px; left: 0; top: 7px; }
    #hud {
      position: fixed; bottom: 20px; left: 20px;
      color: #0f0; font-size: 13px; font-family: monospace;
      text-shadow: 0 0 4px #0f0; pointer-events: none;
      line-height: 1.8; z-index: 50;
    }
    #info {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 12px; pointer-events: none;
      text-align: center; line-height: 1.6; z-index: 50;
    }
  </style>
</head>
<body>

<div id="loading">
  <div>DRONE WARS</div>
  <div style="font-size:14px; color:#888">Loading assets & physics...</div>
</div>

<div id="crosshair"></div>
<div id="hud">
  <div id="hud-drones">DRONES: 0</div>
  <div id="hud-grounded">GROUNDED: YES</div>
  <div id="hud-pos">POS: 0.0, 0.0, 0.0</div>
  <div id="hud-duck">DUCK: NO</div>
  <div id="hud-ammo">SHOTS FIRED: 0</div>
  <div id="hud-fly">FLY: OFF</div>
</div>
<div id="info">
  WASD — Move &nbsp;|&nbsp; MOUSE — Look &nbsp;|&nbsp; SPACE — Jump/Fly Up &nbsp;|&nbsp; C — Duck/Fly Down &nbsp;|&nbsp; F — Toggle Fly Mode &nbsp;|&nbsp; 0 — Spawn Drone &nbsp;|&nbsp; LEFT CLICK — Shoot &nbsp;|&nbsp; CLICK — Lock Mouse
</div>

<canvas id="renderCanvas"></canvas>

<!-- Babylon.js -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<!-- Rapier physics -->
<script type="module">
  import RAPIER from 'https://cdn.skypack.dev/@dimforge/rapier3d-compat';
  window.RAPIER = RAPIER;
</script>
<!-- Yuka (AI placeholder) -->
<script src="https://cdn.jsdelivr.net/npm/yuka@0.7.8/build/yuka.min.js"></script>
<!-- Tone.js (audio placeholder) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

<script>
// ============================================================
//  DRONE WARS — Babylon.js with Flying & Rapier Physics
// ============================================================

const SCENE_JSON = '/drone_wars/drone_wars_assets_dev.json'; // adjust path if needed
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });

// Globals
let scene, camera, light;
let assetsData = null;
let buildings = [];
let flightWaypoints = [];
let isPointerLocked = false;
let keys = {};
let world;
let playerBody;
let flying = false;
let grounded = true;
let ducking = false;

// Config
const CONFIG = {
  launchPoint: { x: -13, y: 2, z: 2.8 },
  droneRiseHeight: 8,
  droneMaxSpeed: 5,
  dronePathRadius: 4.0,
  droneFlightHeight: 2.5,
  freeFlyCamSpeed: 20,
  playerMass: 80,
  moveForce: 400,
  jumpImpulse: 450,
  flySpeed: 15,
};

// ============================================================
//  PHYSICS INIT
// ============================================================
async function initPhysics() {
  await RAPIER.init();
  world = new RAPIER.World({ x: 0.0, y: -9.81, z: 0.0 });

  // Player capsule
  const playerDesc = RAPIER.RigidBodyDesc.dynamic()
    .setTranslation(0, 5, -10)
    .setLinearDamping(4.0)
    .setAngularDamping(10.0);
  playerBody = world.createRigidBody(playerDesc);

  const colliderDesc = RAPIER.ColliderDesc.capsule(0.9, 1.0)
    .setMass(CONFIG.playerMass)
    .setFriction(0.3)
    .setRestitution(0.0);
  world.createCollider(colliderDesc, playerBody);
}

// ============================================================
//  SCENE SETUP
// ============================================================
function createScene() {
  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.05, 0.05, 0.1, 1);

  light = new BABYLON.HemisphericLight("hemi", new BABYLON.Vector3(0, 1, 0), scene);
  light.intensity = 0.7;
  new BABYLON.DirectionalLight("dir", new BABYLON.Vector3(-0.5, -1, -0.3), scene).intensity = 0.5;

  camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 5, -15), scene);
  camera.attachControl(canvas, true);
  camera.speed = 0.0;
  camera.angularSensibility = 1200;
  camera.minZ = 0.1;

  // Pointer lock
  canvas.addEventListener("click", () => canvas.requestPointerLock());
  document.addEventListener("pointerlockchange", () => {
    isPointerLocked = document.pointerLockElement === canvas;
  });

  // Input
  window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === "f") {
      flying = !flying;
      document.getElementById("hud-fly").textContent = `FLY: ${flying ? "ON" : "OFF"}`;
      playerBody.setGravityScale(flying ? 0 : 1, true);
    }
    if (e.key === "c") ducking = true;
    if (e.key === " ") e.preventDefault();
  });
  window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
    if (e.key === "c") ducking = false;
  });

  return scene;
}

// ============================================================
//  LOAD ASSETS
// ============================================================
async function loadSceneData() {
  const res = await fetch(SCENE_JSON);
  assetsData = await res.json();

  for (const b of assetsData.buildings) {
    const asset = assetsData.assets.find(a => a.id === b.model.replace("#", ""));
    if (!asset) continue;

    const result = await BABYLON.SceneLoader.ImportMeshAsync("", "", asset.src, scene);
    const root = result.meshes[0];

    const [px, py, pz] = b.position.split(" ").map(Number);
    const [sx, sy, sz] = (b.scale || "1 1 1").split(" ").map(Number);

    root.position = new BABYLON.Vector3(px, py, pz);
    root.scaling = new BABYLON.Vector3(sx, sy, sz);

    // Static collider (simple box approximation)
    if (b.class === "terrain" || b.class === "collidable") {
      const bodyDesc = RAPIER.RigidBodyDesc.fixed().setTranslation(px, py, pz);
      const body = world.createRigidBody(bodyDesc);
      const half = new BABYLON.Vector3(sx * 0.5, sy * 0.5, sz * 0.5);
      const shape = RAPIER.ColliderDesc.cuboid(half.x, half.y, half.z)
        .setFriction(0.6)
        .setRestitution(0.1);
      world.createCollider(shape, body);
    }

    buildings.push(root);
  }

  assetsData.waypoints.forEach(wp => {
    const [x,y,z] = wp.position.split(" ").map(Number);
    flightWaypoints.push(new YUKA.Vector3(x,y,z));
  });
}

// ============================================================
//  PLAYER MOVEMENT & PHYSICS
// ============================================================
function updatePlayer(dt) {
  if (!playerBody || !isPointerLocked) return;

  const forward = camera.getFrontPosition(1).subtract(camera.position).normalizeToNew();
  const right = BABYLON.Vector3.Cross(forward, BABYLON.Vector3.Up()).normalizeToNew();

  let moveDir = BABYLON.Vector3.Zero();
  if (keys["w"]) moveDir.addInPlace(forward);
  if (keys["s"]) moveDir.subtractInPlace(forward);
  if (keys["a"]) moveDir.subtractInPlace(right);
  if (keys["d"]) moveDir.addInPlace(right);

  if (moveDir.lengthSquared() > 0.001) {
    moveDir.normalize();
    const forceMagnitude = flying ? CONFIG.flySpeed : CONFIG.moveForce;
    const force = moveDir.scale(forceMagnitude);
    playerBody.applyForceAtCenter({ x: force.x, y: 0, z: force.z }, true);
  }

  // Jump / fly up
  if (keys[" "]) {
    if (flying) {
      playerBody.applyImpulse({ x: 0, y: CONFIG.flySpeed * 20 * dt, z: 0 }, true);
    } else if (grounded) {
      playerBody.applyImpulse({ x: 0, y: CONFIG.jumpImpulse, z: 0 }, true);
    }
  }

  // Duck / fly down
  if (ducking || keys["c"]) {
    if (flying) {
      playerBody.applyImpulse({ x: 0, y: -CONFIG.flySpeed * 20 * dt, z: 0 }, true);
    }
    document.getElementById("hud-duck").textContent = "DUCK: YES";
  } else {
    document.getElementById("hud-duck").textContent = "DUCK: NO";
  }

  // Sync camera to physics body
  const pos = playerBody.translation();
  camera.position.set(pos.x, pos.y + 1.6, pos.z);

  // Grounded check with raycast
  const rayOrigin = new BABYLON.Vector3(pos.x, pos.y + 0.1, pos.z);
  const ray = new BABYLON.Ray(rayOrigin, new BABYLON.Vector3(0, -1, 0), 2.5);
  const pick = scene.pickWithRay(ray, mesh => mesh.checkCollisions);
  grounded = pick.hit && pick.distance < 2.2;

  document.getElementById("hud-grounded").textContent = `GROUNDED: ${grounded ? "YES" : "NO"}`;

  // HUD position
  document.getElementById("hud-pos").textContent = 
    `POS: ${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}`;
}

// ============================================================
//  BOOT
// ============================================================
async function boot() {
  await initPhysics();
  scene = createScene();

  document.getElementById("loading").innerHTML = "Loading models...";

  await loadSceneData();

  // Set initial position after loading
  const startPos = new BABYLON.Vector3(0, 5, -10);
  playerBody.setTranslation({ x: startPos.x, y: startPos.y, z: startPos.z }, true);
  camera.position.copyFrom(startPos);

  // Main loop
  scene.registerBeforeRender(() => {
    const dt = engine.getDeltaTime() / 1000;
    world.step();
    updatePlayer(dt);
    // TODO: drones, shooting, billboards, etc.
  });

  document.getElementById("loading").classList.add("hidden");

  // Audio context unlock
  const startAudio = async () => {
    await Tone.start();
    document.removeEventListener("click", startAudio);
    document.removeEventListener("keydown", startAudio);
  };
  document.addEventListener("click", startAudio);
  document.addEventListener("keydown", startAudio);

  engine.runRenderLoop(() => scene.render());
}

boot();

window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
