<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Drone Wars — BabylonJS</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow:hidden; background:#000; }
#renderCanvas { width:100%; height:100%; touch-action:none; }

#hud {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: #0f0;
  font-family: monospace;
  font-size: 13px;
  text-shadow: 0 0 4px #0f0;
}
</style>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
</head>

<body>
<canvas id="renderCanvas"></canvas>

<div id="hud">
  <div id="hud-drones">DRONES: 0</div>
  <div id="hud-grounded">GROUNDED: YES</div>
  <div id="hud-pos">POS: 0,0,0</div>
</div>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

let scene;
let player;
let drones = [];
let physicsPlugin;

const CONFIG = {
  droneMaxSpeed: 5,
  droneRiseHeight: 8,
  droneFlightHeight: 3
};

// ============================================================
// SCENE SETUP
// ============================================================
async function createScene() {

  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0.53, 0.81, 0.92, 1);

  // ---- PHYSICS (Havok) ----
  const havok = await HavokPhysics();
  physicsPlugin = new BABYLON.HavokPlugin(true, havok);
  scene.enablePhysics(new BABYLON.Vector3(0,-9.81,0), physicsPlugin);

  // ---- CAMERA (FPS) ----
  const camera = new BABYLON.UniversalCamera("playerCam",
    new BABYLON.Vector3(0, 3, -10),
    scene
  );

  camera.attachControl(canvas, true);
  camera.speed = 0;
  camera.inertia = 0;
  camera.angularSensibility = 4000;

  player = camera;

  canvas.addEventListener("click", () => {
    canvas.requestPointerLock();
  });

  // ---- LIGHTING ----
  const hemi = new BABYLON.HemisphericLight(
    "hemi",
    new BABYLON.Vector3(0,1,0),
    scene
  );
  hemi.intensity = 0.6;

  const sun = new BABYLON.DirectionalLight(
    "sun",
    new BABYLON.Vector3(-0.3,-1,-0.2),
    scene
  );
  sun.position = new BABYLON.Vector3(80,200,60);
  sun.intensity = 2.0;

  // ---- GROUND ----
  const ground = BABYLON.MeshBuilder.CreateGround(
    "ground",
    { width:10000, height:10000 },
    scene
  );

  const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
  groundMat.diffuseColor = new BABYLON.Color3(0.55,0.45,0.35);
  ground.material = groundMat;

  ground.receiveShadows = true;

  ground.physicsAggregate = new BABYLON.PhysicsAggregate(
    ground,
    BABYLON.PhysicsShapeType.BOX,
    { mass: 0 },
    scene
  );

  // ---- PLAYER COLLIDER ----
  const playerCollider = BABYLON.MeshBuilder.CreateCapsule(
    "playerBody",
    { height: 2, radius: 0.4 },
    scene
  );

  playerCollider.isVisible = false;

  playerCollider.physicsAggregate = new BABYLON.PhysicsAggregate(
    playerCollider,
    BABYLON.PhysicsShapeType.CAPSULE,
    { mass: 1, restitution:0 },
    scene
  );

  playerCollider.position = new BABYLON.Vector3(0,3,0);
  camera.parent = playerCollider;

  // ---- INPUT ----
  const inputMap = {};
  scene.actionManager = new BABYLON.ActionManager(scene);

  scene.actionManager.registerAction(
    new BABYLON.ExecuteCodeAction(
      BABYLON.ActionManager.OnKeyDownTrigger,
      evt => inputMap[evt.sourceEvent.key] = true
    )
  );

  scene.actionManager.registerAction(
    new BABYLON.ExecuteCodeAction(
      BABYLON.ActionManager.OnKeyUpTrigger,
      evt => inputMap[evt.sourceEvent.key] = false
    )
  );

  // ---- PLAYER UPDATE ----
  scene.onBeforeRenderObservable.add(() => {

    const dt = engine.getDeltaTime() / 1000;

    const forward = camera.getDirection(BABYLON.Vector3.Forward());
    const right   = camera.getDirection(BABYLON.Vector3.Right());

    let move = BABYLON.Vector3.Zero();

    if (inputMap["w"]) move.addInPlace(forward);
    if (inputMap["s"]) move.subtractInPlace(forward);
    if (inputMap["a"]) move.subtractInPlace(right);
    if (inputMap["d"]) move.addInPlace(right);

    move.y = 0;

    if (move.length() > 0) {
      move.normalize();
      move.scaleInPlace(10 * dt);
      playerCollider.physicsBody.applyImpulse(move, playerCollider.getAbsolutePosition());
    }

    updateHUD(playerCollider);
    updateDrones(dt);
  });

  return scene;
}

// ============================================================
// DRONE SYSTEM
// ============================================================

function spawnDrone(pos) {

  const drone = BABYLON.MeshBuilder.CreateBox("drone", { size:0.6 }, scene);
  drone.position = pos.clone();

  const mat = new BABYLON.StandardMaterial("droneMat", scene);
  mat.diffuseColor = new BABYLON.Color3(0.2,0.4,0.2);
  drone.material = mat;

  drone.physicsAggregate = new BABYLON.PhysicsAggregate(
    drone,
    BABYLON.PhysicsShapeType.BOX,
    { mass: 0.5 },
    scene
  );

  drone.metadata = {
    state: "rising",
    velocity: new BABYLON.Vector3()
  };

  drones.push(drone);
  updateDroneHUD();
}

function updateDrones(dt) {

  drones.forEach(drone => {

    const meta = drone.metadata;

    if (meta.state === "rising") {
      drone.position.y += dt * 3;
      if (drone.position.y > CONFIG.droneRiseHeight) {
        meta.state = "patrol";
      }
      return;
    }

    if (meta.state === "patrol") {
      const t = performance.now() * 0.001;
      drone.position.x += Math.sin(t) * dt * CONFIG.droneMaxSpeed;
      drone.position.z += Math.cos(t) * dt * CONFIG.droneMaxSpeed;
    }

  });
}

// ============================================================
// HUD
// ============================================================

function updateHUD(body) {
  const p = body.position;
  document.getElementById("hud-pos").textContent =
    `POS: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
}

function updateDroneHUD() {
  document.getElementById("hud-drones").textContent =
    `DRONES: ${drones.length}`;
}

// ============================================================
// BOOT
// ============================================================

createScene().then(scene => {

  // Spawn test drones
  spawnDrone(new BABYLON.Vector3(5,2,5));
  spawnDrone(new BABYLON.Vector3(-5,2,3));

  engine.runRenderLoop(() => {
    scene.render();
  });

});

window.addEventListener("resize", () => {
  engine.resize();
});
</script>
</body>
</html>
