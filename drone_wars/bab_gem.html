<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Drone Wars - Babylon.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    #renderCanvas { width: 100vw; height: 100vh; display: block; touch-action: none; outline: none; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #111; color: #fff;
      font-size: 22px; z-index: 100; flex-direction: column; gap: 12px;
    }
    #loading.hidden { display: none; }
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 16px; left: 7px; top: 0; }
    #crosshair::after  { width: 16px; height: 2px; left: 0; top: 7px; }
    #hud {
      position: fixed; bottom: 20px; left: 20px;
      color: #0f0; font-size: 13px; font-family: monospace;
      text-shadow: 0 0 4px #0f0; pointer-events: none;
      line-height: 1.8;
    }
    #info {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 12px; pointer-events: none;
      text-align: center; line-height: 1.6;
    }
  </style>
</head>
<body>

<div id="loading">
  <div>DRONE WARS (BABYLON.JS)</div>
  <div style="font-size:14px; color:#888">Loading assets...</div>
</div>

<div id="crosshair"></div>
<div id="hud">
  <div id="hud-drones">DRONES: 0</div>
  <div id="hud-grounded">GROUNDED: YES</div>
  <div id="hud-pos">POS: 0.0, 0.0, 0.0</div>
  <div id="hud-duck">DUCK: NO</div>
  <div id="hud-ammo">SHOTS FIRED: 0</div>
</div>
<div id="info">
  WASD — Move &nbsp;|&nbsp; MOUSE — Look &nbsp;|&nbsp; SPACE — Jump &nbsp;|&nbsp; C — Duck &nbsp;|&nbsp; F — FreeCam &nbsp;|&nbsp; 0 — Spawn Drone &nbsp;|&nbsp; LEFT CLICK — Shoot &nbsp;|&nbsp; CLICK — Lock Mouse
</div>

<canvas id="renderCanvas"></canvas>

<!-- Babylon.js core and loaders -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
<!-- Yuka -->
<script src="https://cdn.jsdelivr.net/npm/yuka@0.7.8/build/yuka.min.js"></script>
<!-- Tone.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
<!-- Rapier -->
<script type="module">
  import RAPIER from 'https://scottgrocott.github.io/metal_throne/assets/js/rapier3d-compat/rapier.mjs';
  window.RAPIER = RAPIER;
</script>

<script>
// ============================================================
//  DRONE WARS — Babylon.js + Tone.js + Yuka + Rapier
// ============================================================

const SCENE_JSON = '/drone_wars/drone_wars_assets_dev.json';
const GROUND_TEX = 'https://scottgrocott.github.io/metal_throne/assets/img/gpt_ground.png';
const LADDER_TEX = 'https://scottgrocott.github.io/metal_throne/assets/img/ladder.png';

const CONFIG = {
  launchPoint: { x: -13, y: 2, z: 2.8 },
  droneRiseHeight: 8,
  droneMaxSpeed: 5,
  dronePathRadius: 4.0,
  droneFlightHeight: 2.5,
  freeFlyCamSpeed: 20,

  sheetGrids: {
    sheet_rocks:  { cols: 4, rows: 2 },
    sheet_veg:    { cols: 4, rows: 2 },
    sheet_veg01:  { cols: 4, rows: 2 },
    sheet_map:    { cols: 4, rows: 4 },
    sheet_map01:  { cols: 4, rows: 2 },
    sheet_map02:  { cols: 4, rows: 4 },
  },

  scatter: {
    vegSampleCount: 30000,
    vegSteepDensity:  0.9,
    vegFlatDensity:   0.35,
    vegSize: { w: 0.6, h: 0.9 },
    sampleCount: 6000,
    flatRockDensity:   0.10,
    flatStumpDensity:  0.06,
    flatBoxDensity:    0.02,
    buildingRingRadius: 10,
    buildingRingDensity: 0.7,
    flatThreshold:  0.85,
    steepThreshold: 0.45,
    elevationSplit: 2,
    rockSize:  { w: 2.0, h: 1.8 },
    stumpSize: { w: 1.5, h: 2.0 },
    boxSize:   { w: 4.0, h: 5.0 },
  },

  gunRange: 200, gunPower: 8, bulletSpeed: 60, bulletRadius: 0.12, bulletLife: 3.0, hitsToDetonate: 10,
};

const PLAYER = { height: 1.6, radius: 0.4, mass: 80, jumpForce: 1000, moveSpeed: 5000, maxVelocity: 5, duckHeight: 0.9 };

const LADDERS =[
  { position: [-5, 0, 0], height: 5, width: .5, climbSpeed: 3 },
  { position:[0, -0.60296, -9.54734], height: 10, width: 1, climbSpeed: 7 },
  { position:[-11.44083, 0, 1.05525], height: 8, width: 1, climbSpeed: 7 },
  { position:[-0.83595, 0, 38.20815], height: 10, width: 1, climbSpeed: 7 },
];

// ---- BABYLON.JS SETUP ----
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true, { preserveDrawingBuffer: true, stencil: true });
const scene = new BABYLON.Scene(engine);
scene.useRightHandedSystem = true; 
scene.clearColor = new BABYLON.Color4(135/255, 206/255, 235/255, 1);
scene.fogMode = BABYLON.Scene.FOGMODE_LINEAR;
scene.fogColor = new BABYLON.Color3(135/255, 206/255, 235/255);
scene.fogStart = 100;
scene.fogEnd = 800;

// UniversalCamera ensures clean math rotations and supports free look natively
const camera = new BABYLON.UniversalCamera("camera", new BABYLON.Vector3(0, 0, 0), scene);
camera.minZ = 0.1; 
camera.maxZ = 20000;
camera.rotationQuaternion = new BABYLON.Quaternion();
camera.inputs.clear(); // Disable default drag controls so they don't fight our Pointer Lock FPS logic

// ---- LIGHTING ----
const hemiLight = new BABYLON.HemisphericLight("hemiLight", new BABYLON.Vector3(0, 1, 0), scene);
hemiLight.intensity = 0.5;
hemiLight.groundColor = new BABYLON.Color3(139/255, 115/255, 85/255);

const sunLight = new BABYLON.DirectionalLight("sunLight", new BABYLON.Vector3(-80, -200, -60).normalize(), scene);
sunLight.position = new BABYLON.Vector3(80, 200, 60);
sunLight.diffuse = BABYLON.Color3.FromHexString("#fffde8");
sunLight.intensity = 2.2;

const shadowGenerator = new BABYLON.ShadowGenerator(2048, sunLight);
shadowGenerator.useBlurExponentialShadowMap = true;
shadowGenerator.blurKernel = 32;
shadowGenerator.bias = 0.0003;

window.addEventListener("resize", () => { engine.resize(); });

// ---- POINTER LOCK & MOUSE INPUT ----
const pointerLock = { locked: false, euler: { x: 0, y: 0, z: 0 }, PI_2: Math.PI / 2 };

document.addEventListener('pointerlockchange', () => { 
  pointerLock.locked = document.pointerLockElement === canvas; 
});

scene.onPointerObservable.add((pi) => {
  if (pi.type === BABYLON.PointerEventTypes.POINTERDOWN) {
    if (pi.event.button !== 0) return;
    if (!pointerLock.locked) {
      canvas.requestPointerLock();
    } else {
      shootBullet();
    }
  } else if (pi.type === BABYLON.PointerEventTypes.POINTERMOVE) {
    if (!pointerLock.locked) return;
    const e = pi.event;
    const sens = 0.002;
    // Map movement to FPS pitch/yaw
    pointerLock.euler.y -= (e.movementX || 0) * sens;
    pointerLock.euler.x -= (e.movementY || 0) * sens;
    pointerLock.euler.x = Math.max(-pointerLock.PI_2, Math.min(pointerLock.PI_2, pointerLock.euler.x));
    
    // Apply exact rotation payload to the camera quaternion
    BABYLON.Quaternion.RotationYawPitchRollToRef(
      pointerLock.euler.y, 
      pointerLock.euler.x, 
      0, 
      camera.rotationQuaternion
    );
  }
});


// ---- GROUND ----
const ground = BABYLON.MeshBuilder.CreateGround("ground", {width: 10000, height: 10000}, scene);
const groundMat = new BABYLON.PBRMaterial("gmat", scene);
const groundTex = new BABYLON.Texture(GROUND_TEX, scene);
groundTex.uScale = 2250; groundTex.vScale = 2250;
groundMat.albedoTexture = groundTex;
groundMat.metallic = 0.05; groundMat.roughness = 0.95;
groundMat.albedoColor = BABYLON.Color3.FromHexString("#8B7355");
ground.material = groundMat;
ground.receiveShadows = true;

// ============================================================
//  RAPIER PHYSICS
// ============================================================
let physicsWorld = null; let physicsReady = false; let physicsAccumulator = 0; const PHYSICS_DT = 1 / 60;

async function initPhysics() {
  while (!window.RAPIER) await sleep(100);
  await window.RAPIER.init();
  physicsWorld = new window.RAPIER.World({ x: 0, y: -9.81, z: 0 });
  physicsReady = true;

  const R = window.RAPIER;
  const groundBody = physicsWorld.createRigidBody(R.RigidBodyDesc.fixed().setTranslation(0, -0.5, 0));
  physicsWorld.createCollider(R.ColliderDesc.cuboid(5000, 0.5, 5000), groundBody);
}

const raycastMeshes =[];
let _sceneData = null;
let _spriteLoadPromise = Promise.resolve();
let _rayQueryResults = {};

const WALL_SENSE_DIST = 5.0;
const WALL_AVOID_DIRS = (() => {
  const dirs =[];
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2;
    dirs.push(new BABYLON.Vector3(Math.cos(a), 0, Math.sin(a)).normalize());
  }
  return dirs;
})();

function queryPhysics() {
  _rayQueryResults = {};
  player.isGrounded = playerRig.position.y <= PLAYER.height + 0.25;
  if (!raycastMeshes.length) return;

  for (const drone of drones) {
    if (drone.dead) continue;
    const pos = drone.group.position;
    const result = { wallPush: { x: 0, z: 0 }, detonatorHit: false };

    for (const dir of WALL_AVOID_DIRS) {
      const ray = new BABYLON.Ray(pos, dir, WALL_SENSE_DIST);
      const hit = scene.pickWithRay(ray, m => raycastMeshes.includes(m));
      if (hit && hit.hit) {
        const strength = (1 - hit.distance / WALL_SENSE_DIST) * 6;
        result.wallPush.x -= dir.x * strength;
        result.wallPush.z -= dir.z * strength;
      }
    }

    if (drone.detonatorArmed) {
      const detWorld = drone.detonatorMesh.getAbsolutePosition();
      const fwd = new BABYLON.Vector3(0, 0, 1);
      fwd.rotateByQuaternionToRef(drone.group.rotationQuaternion, fwd);
      const ray = new BABYLON.Ray(detWorld, fwd.normalize(), 0.5);
      const hit = scene.pickWithRay(ray, m => raycastMeshes.includes(m));
      if (hit && hit.hit) result.detonatorHit = true;
    }
    _rayQueryResults[drone.id] = result;
  }
}

function stepPhysics(dt) {
  if (!physicsReady) return;
  physicsAccumulator += Math.min(dt, 0.1);
  while (physicsAccumulator >= PHYSICS_DT) {
    physicsWorld.step();
    physicsAccumulator -= PHYSICS_DT;
  }
}

// ============================================================
//  DRONE COCKPIT PROPS
// ============================================================
const cockpitGroup = new BABYLON.TransformNode("cockpit", scene);
cockpitGroup.parent = camera;
cockpitGroup.rotationQuaternion = new BABYLON.Quaternion();
cockpitGroup.setEnabled(false);

(function buildCockpit() {
  const bodyMat = new BABYLON.PBRMaterial("cbm", scene); bodyMat.albedoColor = BABYLON.Color3.FromHexString("#334433"); bodyMat.metallic = 0.6; bodyMat.roughness = 0.4;
  const armMat  = new BABYLON.PBRMaterial("cam", scene); armMat.albedoColor = BABYLON.Color3.FromHexString("#223322"); armMat.metallic = 0.7; armMat.roughness = 0.3;
  const rotorMat = new BABYLON.PBRMaterial("crm", scene); rotorMat.albedoColor = BABYLON.Color3.FromHexString("#ff2200"); rotorMat.emissiveColor = BABYLON.Color3.FromHexString("#ff1100");
  const detMat  = new BABYLON.PBRMaterial("cdm", scene); detMat.albedoColor = BABYLON.Color3.FromHexString("#ff4400"); detMat.emissiveColor = BABYLON.Color3.FromHexString("#ff0000");

  const body = BABYLON.MeshBuilder.CreateBox("cb", {width:0.22, height:0.04, depth:0.18}, scene);
  body.material = bodyMat; body.position.set(0, -0.14, -0.28); body.parent = cockpitGroup;

  const armL = BABYLON.MeshBuilder.CreateBox("cal", {width:0.28, height:0.025, depth:0.035}, scene);
  armL.material = armMat; armL.position.set(-0.16, -0.13, -0.30); armL.rotation.y = 0.22; armL.parent = cockpitGroup;

  const armR = BABYLON.MeshBuilder.CreateBox("car", {width:0.28, height:0.025, depth:0.035}, scene);
  armR.material = armMat; armR.position.set(0.16, -0.13, -0.30); armR.rotation.y = -0.22; armR.parent = cockpitGroup;

  const rotorL = BABYLON.MeshBuilder.CreateCylinder("crl", {diameter:0.13, height:0.008}, scene);
  rotorL.material = rotorMat; rotorL.position.set(-0.265, -0.12, -0.36); rotorL.metadata = { isCockpitRotor: true, spinDir: 1 }; rotorL.parent = cockpitGroup;

  const rotorR = BABYLON.MeshBuilder.CreateCylinder("crr", {diameter:0.13, height:0.008}, scene);
  rotorR.material = rotorMat; rotorR.position.set(0.265, -0.12, -0.36); rotorR.metadata = { isCockpitRotor: true, spinDir: -1 }; rotorR.parent = cockpitGroup;

  const det = BABYLON.MeshBuilder.CreateCylinder("cd", {diameter:0.036, height:0.07}, scene);
  det.material = detMat; det.rotation.x = Math.PI / 2; det.position.set(0, -0.13, -0.36); det.parent = cockpitGroup;
})();

const cockpitSway = { pitch: 0, roll: 0, bob: 0, bobT: 0 };
function tickCockpit(dt, moveVec) {
  if (!player.freeCam) return;
  const targetPitch = moveVec.y * 0.08, targetRoll = -moveVec.x * 0.06, lerpT = Math.min(1, dt * 5);
  cockpitSway.pitch += (targetPitch - cockpitSway.pitch) * lerpT;
  cockpitSway.roll  += (targetRoll - cockpitSway.roll) * lerpT;
  cockpitSway.bobT += dt * 1.4; cockpitSway.bob = Math.sin(cockpitSway.bobT) * 0.002;

  BABYLON.Quaternion.RotationYawPitchRollToRef(0, cockpitSway.pitch, cockpitSway.roll, cockpitGroup.rotationQuaternion);
  cockpitGroup.position.y = cockpitSway.bob;

  cockpitGroup.getChildren().forEach(c => {
    if (c.metadata && c.metadata.isCockpitRotor) c.rotation.y += dt * 28 * c.metadata.spinDir;
  });
}

const playerRig = new BABYLON.TransformNode("playerRig", scene);
playerRig.position.set(0, PLAYER.height, 0);
camera.parent = playerRig;

const player = {
  rigidBody: null, collider: null, isGrounded: false, justJumped: false, onLadder: false, isDucking: false, freeCam: false,
  keys: { w:false, s:false, a:false, d:false, space:false, duck:false },
  moveDir: new BABYLON.Vector3(0,0,0), shotsFired: 0,
};

function initPlayer() {
  const R = window.RAPIER;
  const pos = playerRig.position;
  player.rigidBody = physicsWorld.createRigidBody(R.RigidBodyDesc.dynamic().setTranslation(pos.x, pos.y, pos.z).lockRotations().setLinearDamping(5.0));
  player.collider = physicsWorld.createCollider(R.ColliderDesc.capsule(PLAYER.height/2 - PLAYER.radius, PLAYER.radius).setMass(PLAYER.mass).setFriction(0).setRestitution(0), player.rigidBody);
}

window.addEventListener('keydown', e => {
  if (e.code==='KeyW'||e.code==='ArrowUp') player.keys.w = true; if (e.code==='KeyS'||e.code==='ArrowDown') player.keys.s = true;
  if (e.code==='KeyA'||e.code==='ArrowLeft') player.keys.a = true; if (e.code==='KeyD'||e.code==='ArrowRight') player.keys.d = true;
  if (e.code==='Space') { player.keys.space = true; e.preventDefault(); }
  if (e.code==='KeyC') player.keys.duck = true;
  if (e.code==='KeyF') {
    player.freeCam = !player.freeCam;
    cockpitGroup.setEnabled(player.freeCam);
    if (player.freeCam && player.rigidBody) player.rigidBody.setEnabled(false);
    else if (player.rigidBody) {
      player.rigidBody.setEnabled(true);
      player.rigidBody.setTranslation(playerRig.position, true);
      player.rigidBody.setLinvel({ x:0, y:0, z:0 }, true);
      cockpitSway.pitch = 0; cockpitSway.roll = 0;
      cockpitGroup.rotationQuaternion.copyFromFloats(0,0,0,1);
    }
  }
  if (e.code==='Digit0' || e.code==='Numpad0') spawnDrone();
});
window.addEventListener('keyup', e => {
  if (e.code==='KeyW'||e.code==='ArrowUp') player.keys.w = false; if (e.code==='KeyS'||e.code==='ArrowDown') player.keys.s = false;
  if (e.code==='KeyA'||e.code==='ArrowLeft') player.keys.a = false; if (e.code==='KeyD'||e.code==='ArrowRight') player.keys.d = false;
  if (e.code==='Space') { player.keys.space = false; player.justJumped = false; }
  if (e.code==='KeyC') player.keys.duck = false;
});

function tickPlayer(dt) {
  if (!player.rigidBody) return;

  if (player.freeCam) {
    const yaw = pointerLock.euler.y, pitch = pointerLock.euler.x;
    const fwd = new BABYLON.Vector3(-Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), -Math.cos(yaw)*Math.cos(pitch));
    const right = new BABYLON.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
    const move = new BABYLON.Vector3(0,0,0);

    if (player.keys.w) move.addInPlace(fwd); if (player.keys.s) move.subtractInPlace(fwd);
    if (player.keys.a) move.subtractInPlace(right); if (player.keys.d) move.addInPlace(right);
    if (player.keys.space) move.y += 1; if (player.keys.duck) move.y -= 1;

    if (move.length() > 0) move.normalize();
    playerRig.position.addInPlace(move.scale(CONFIG.freeFlyCamSpeed * dt));
    tickCockpit(dt, move);

    const p = playerRig.position;
    document.getElementById('hud-grounded').textContent = 'GROUNDED: FREECAM';
    document.getElementById('hud-duck').textContent = 'DUCK: —';
    document.getElementById('hud-pos').textContent = `POS: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
    document.getElementById('hud-ammo').textContent = 'SHOTS FIRED: ' + player.shotsFired;
    return;
  }

  const wantDuck = player.keys.duck;
  if (wantDuck !== player.isDucking) {
    player.isDucking = wantDuck;
    camera.position.y = player.isDucking ? -(PLAYER.height - PLAYER.duckHeight) : 0;
  }

  const yaw = pointerLock.euler.y;
  player.moveDir.set(0, 0, 0);
  if (player.keys.w) { player.moveDir.x -= Math.sin(yaw); player.moveDir.z -= Math.cos(yaw); }
  if (player.keys.s) { player.moveDir.x += Math.sin(yaw); player.moveDir.z += Math.cos(yaw); }
  if (player.keys.a) { player.moveDir.x -= Math.cos(yaw); player.moveDir.z += Math.sin(yaw); }
  if (player.keys.d) { player.moveDir.x += Math.cos(yaw); player.moveDir.z -= Math.sin(yaw); }
  if (player.moveDir.length() > 0) player.moveDir.normalize();

  const spd = player.isDucking ? PLAYER.maxVelocity * 0.5 : PLAYER.maxVelocity;
  const vel = _physCache.playerVel;
  const hspeed = Math.sqrt(vel.x*vel.x + vel.z*vel.z);
  if (hspeed < spd) {
    player.rigidBody.applyImpulse({ x: player.moveDir.x * PLAYER.moveSpeed * dt, y: 0, z: player.moveDir.z * PLAYER.moveSpeed * dt }, true);
  }

  if (player.keys.space && player.isGrounded && !player.justJumped && !player.onLadder && !player.isDucking) {
    player.rigidBody.applyImpulse({ x:0, y:PLAYER.jumpForce, z:0 }, true); player.justJumped = true;
  }

  const p = _physCache.playerPos;
  playerRig.position.set(p.x, p.y, p.z);

  document.getElementById('hud-grounded').textContent = 'GROUNDED: ' + (player.isGrounded ? 'YES' : 'NO');
  document.getElementById('hud-duck').textContent = 'DUCK: ' + (player.isDucking ? 'YES' : 'NO');
  document.getElementById('hud-pos').textContent = `POS: ${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}`;
  document.getElementById('hud-ammo').textContent = 'SHOTS FIRED: ' + player.shotsFired;
}

const _physCache = { playerPos: { x:0, y:0, z:0 }, playerVel: { x:0, y:0, z:0 }, deadDrones: {} };
function syncPhysicsReads() {
  if (!physicsReady) return;
  try {
    if (player.rigidBody) {
      const p = player.rigidBody.translation(), v = player.rigidBody.linvel();
      _physCache.playerPos.x = p.x; _physCache.playerPos.y = p.y; _physCache.playerPos.z = p.z;
      _physCache.playerVel.x = v.x; _physCache.playerVel.y = v.y; _physCache.playerVel.z = v.z;
    }
  } catch(e) {}
  _physCache.deadDrones = {};
  drones.forEach(d => {
    if (d.dead && d.body) {
      try {
        const p = d.body.translation(), r = d.body.rotation();
        _physCache.deadDrones[d.id] = { pos: {x:p.x, y:p.y, z:p.z}, rot: {x:r.x, y:r.y, z:r.z, w:r.w} };
      } catch(e) {}
    }
  });
}

// ============================================================
//  BUILDINGS
// ============================================================
const buildingBodies =[];

function loadBuildings(data) {
  const terrainGroundTex = new BABYLON.Texture(GROUND_TEX, scene);
  terrainGroundTex.uScale = 2250; terrainGroundTex.vScale = 2250;
  const terrainGroundMat = new BABYLON.PBRMaterial("tgm", scene);
  terrainGroundMat.albedoTexture = terrainGroundTex;
  terrainGroundMat.roughness = 0.95; terrainGroundMat.metallic = 0.05;
  terrainGroundMat.albedoColor = BABYLON.Color3.FromHexString("#8B7355");

  data.buildings.forEach(b => {
    const[px, py, pz] = b.position.split(' ').map(Number);
    const [sx, sy, sz] = (b.scale||'1 1 1').split(' ').map(n => Number(n) * (b.class === 'terrain' ? 1 : 1.15));
    const isTerrain = b.class === 'terrain';
    const url = b.model.startsWith('#') ? getAssetSrc(data.assets, b.model.slice(1)) : b.model;

    BABYLON.SceneLoader.ImportMeshAsync("", url, "", scene).then(result => {
      const root = result.meshes[0];
      root.position.set(px, py, pz);
      root.scaling.set(sx, sy, sz);

      const subMeshes = result.meshes.slice(1);
      subMeshes.forEach(m => {
        if (!isTerrain) shadowGenerator.addShadowCaster(m);
        m.receiveShadows = true;
        if (isTerrain) m.material = terrainGroundMat;
        raycastMeshes.push(m);
      });

      buildStaticCollider(root);
      if (isTerrain) {
        setTimeout(async () => {
          await _spriteLoadPromise;

function buildStaticCollider(modelGroup) {
  const R = window.RAPIER;
  const vertices = [], indices =[];
  let idx = 0;

  const meshes = modelGroup.getChildMeshes(false);
  meshes.forEach(node => {
    node.computeWorldMatrix(true);
    const wm = node.getWorldMatrix();
    const pos = node.getVerticesData(BABYLON.VertexBuffer.PositionKind);
    const inds = node.getIndices();
    if(!pos || !inds) return;

    for (let i = 0; i < pos.length; i += 3) {
      const v = BABYLON.Vector3.TransformCoordinates(new BABYLON.Vector3(pos[i], pos[i+1], pos[i+2]), wm);
      vertices.push(v.x, v.y, v.z);
    }
    for (let i = 0; i < inds.length; i++) indices.push(idx + inds[i]);
    idx += pos.length / 3;
  });

  const body = physicsWorld.createRigidBody(R.RigidBodyDesc.fixed());

let toneReady = false;
const DRONE_PITCHES =[110, 130.81, 164.81, 196, 246.94, 293.66, 329.63, 392];

function initAudio() {
  try {
    const noiseNode = new Tone.Noise('pink').start();
    const autoFilter = new Tone.AutoFilter({ frequency: '0.1', baseFrequency: 200, octaves: 3 }).start();
    const windEnv = new Tone.Volume(-28);
    noiseNode.connect(autoFilter); autoFilter.connect(windEnv); windEnv.toDestination();

    function windGust() {
      const t = Tone.now(); windEnv.volume.rampTo(-20, 2, t); windEnv.volume.rampTo(-40, 3, t + 2 + Math.random()*3);
      setTimeout(windGust, 6000 + Math.random() * 12000);
    }
    windGust(); toneReady = true;
  } catch(e) {}
}

function createDroneSynth(pitchHz, droneIndex) {
  const freq = DRONE_PITCHES[droneIndex % DRONE_PITCHES.length];
  const osc1 = new Tone.Oscillator(freq, 'sawtooth'), osc2 = new Tone.Oscillator(freq * 1.01, 'square'), osc3 = new Tone.Oscillator(freq * 2, 'sawtooth');
  const distortion = new Tone.Distortion(0.4), filter = new Tone.Filter(800, 'lowpass'), panner = new Tone.Panner(0), vol = new Tone.Volume(-18);
  osc1.connect(distortion); osc2.connect(distortion); osc3.connect(distortion); distortion.connect(filter); filter.connect(panner); panner.connect(vol); vol.toDestination();
  osc1.start(); osc2.start(); osc3.start();
  return { osc1, osc2, osc3, panner, vol, filter, baseFreq: freq };
}

function updateDroneSpatial(synth, dronePos) {
  if (!synth) return;
  try {
    const pp = camera.globalPosition;
    const dist = BABYLON.Vector3.Distance(dronePos, pp);
    if (!isFinite(dist) || dist < 0.01) return;

    const maxDist = 120, minVol = -60, maxVol = -4, normDist = Math.min(dist / maxDist, 1.0);
    const vol = dist < maxDist ? maxVol + (minVol - maxVol) * (normDist * normDist) : minVol;
    if (isFinite(vol)) synth.vol.volume.setTargetAtTime(vol, Tone.now(), 0.8);

    const dx = dronePos.x - pp.x, dz = dronePos.z - pp.z, hLen = Math.sqrt(dx*dx + dz*dz);
    if (hLen > 0.01) {
      const right = camera.getDirection(new BABYLON.Vector3(1, 0, 0));
      const toDrone = new BABYLON.Vector3(dx / hLen, 0, dz / hLen);
      const pan = Math.max(-1, Math.min(1, BABYLON.Vector3.Dot(toDrone, right)));
      if (isFinite(pan)) synth.panner.pan.setTargetAtTime(pan, Tone.now(), 0.05);
    }
    const speed = Math.max(0.5, Math.min(2.0, 1 - dist / 80));
    synth.osc1.frequency.setTargetAtTime(synth.baseFreq * speed, Tone.now(), 0.2);
    synth.osc2.frequency.setTargetAtTime(synth.baseFreq * 1.01 * speed, Tone.now(), 0.2);
    synth.osc3.frequency.setTargetAtTime(synth.baseFreq * 2 * speed, Tone.now(), 0.2);
  } catch(e) {}
}

  if (!toneReady) return;
  try {
    const noise = new Tone.Noise('white'); const env = new Tone.AmplitudeEnvelope({ attack: 0.01, decay: 0.4, sustain: 0, release: 0.5 });
    const dist = new Tone.Distortion(0.8); const filt = new Tone.Filter(400, 'lowpass'); const vol = new Tone.Volume(-6);

  } catch(e) {}
}

const yukaManager = new YUKA.EntityManager();

const flightWaypoints =[];
const drones =[]; let droneCount = 0;

function spawnDrone() {
  if (!physicsReady) return;
  const R = window.RAPIER;
  const { x: ox, y: oy, z: oz } = CONFIG.launchPoint;
  const color = new BABYLON.Color3(Math.random(), Math.random() * 0.5 + 0.3, Math.random() * 0.3);

  const group = new BABYLON.TransformNode("droneGroup_" + droneCount, scene);
  group.position.set(ox, oy, oz); group.rotationQuaternion = new BABYLON.Quaternion();

  const bodyMat = new BABYLON.PBRMaterial("bmat", scene);
  bodyMat.albedoColor = color; bodyMat.emissiveColor = color.scale(0.6); bodyMat.metallic = 0.3; bodyMat.roughness = 0.5;
  const bodyMesh = BABYLON.MeshBuilder.CreateBox("db", {width:1.5, height:0.25, depth:1.5}, scene);
  bodyMesh.material = bodyMat; bodyMesh.parent = group;

  const rotorMat = new BABYLON.PBRMaterial("rmat", scene);

  [[-0.8,0.15,-0.8],[0.8,0.15,-0.8],[-0.8,0.15,0.8],[0.8,0.15,0.8]].forEach(([x,y,z]) => {

  detMat.albedoColor = BABYLON.Color3.FromHexString("#ff4400"); detMat.emissiveColor = BABYLON.Color3.FromHexString("#ff0000"); detMat.metallic = 0.8; detMat.roughness = 0.2;

  detMesh.material = detMat; detMesh.rotationQuaternion = BABYLON.Quaternion.RotationAxis(new BABYLON.Vector3(1,0,0), Math.PI/2); detMesh.position.set(0, 0, 0.9); detMesh.parent = group;

  const body = physicsWorld.createRigidBody(R.RigidBodyDesc.kinematicPositionBased().setTranslation(ox, oy, oz));
  const collider = physicsWorld.createCollider(R.ColliderDesc.ball(0.6).setMass(2).setFriction(0).setRestitution(0.3), body);

  let wpIndex = Math.floor(Math.random() * Math.max(1, flightWaypoints.length));
  const vel = new BABYLON.Vector3(1, 0, 0), pos = new BABYLON.Vector3(ox, oy, oz);
  const vehicle = new YUKA.Vehicle(); vehicle.maxSpeed = CONFIG.droneMaxSpeed; vehicle.position.set(ox, oy, oz); yukaManager.add(vehicle);

  const heightOffset = (droneCount % 5) * 1.2 - 2.4;
  let droneState = 'rising', huntCooldown = 0;

  function canSeePlayer() {
    const pp = camera.globalPosition;
    const toPlayer = pp.subtract(pos);
    const dist = toPlayer.length();
    if (dist > 60) return false;
    const ray = new BABYLON.Ray(pos, toPlayer.normalize(), dist);
    const hit = scene.pickWithRay(ray, m => raycastMeshes.includes(m));
    return !hit.hit;
  }

  function updateMovement(dt, wallPush) {
    if (!flightWaypoints.length) return;
    if (droneState === 'rising') {
      const targetY = CONFIG.droneRiseHeight, dy = targetY - pos.y;
      vel.set(0, dy > 0 ? CONFIG.droneMaxSpeed * 0.6 : 0, 0);
      pos.y += vel.y * dt;
      if (pos.y >= targetY) { pos.y = targetY; droneState = 'patrol'; }
      group.position.copyFrom(pos);
      try { body.setNextKinematicTranslation({ x: pos.x, y: pos.y, z: pos.z }); } catch(e) {}
      return;
    }

    if (droneState === 'patrol' && canSeePlayer()) { droneState = 'hunting'; huntCooldown = 4.0; }
    if (droneState === 'hunting') {
      huntCooldown -= dt;
      const pp = camera.globalPosition, dx = pp.x - pos.x, dy = pp.y - pos.y, dz = pp.z - pos.z;
      const fullDist = Math.sqrt(dx*dx + dy*dy + dz*dz), invDist = fullDist > 0.01 ? 1 / fullDist : 0;
      const speed = CONFIG.droneMaxSpeed * 1.6, turn = Math.min(1, dt * 5);

    const speed = CONFIG.droneMaxSpeed, fullDist = Math.sqrt(dx*dx + dy*dy + dz*dz), invDist = fullDist > 0.01 ? 1 / fullDist : 0;
    const turn = Math.min(1, dt * 4);
    vel.x += (dx * invDist * speed - vel.x) * turn; vel.y += (dy * invDist * speed - vel.y) * turn; vel.z += (dz * invDist * speed - vel.z) * turn;
    if (wallPush) { vel.x += wallPush.x * 0.15; vel.z += wallPush.z * 0.15; }
    const spd = vel.length(); if (spd > speed) vel.scaleInPlace(speed / spd);
    pos.addInPlace(vel.scale(dt)); group.position.copyFrom(pos);
    if (spd > 0.1) BABYLON.Quaternion.RotationYawPitchRollToRef(Math.atan2(vel.x, vel.z), 0, 0, group.rotationQuaternion);
    try { body.setNextKinematicTranslation({ x: pos.x, y: pos.y, z: pos.z }); } catch(e) {}
  }

  let synth = null; try { if (toneReady) synth = createDroneSynth(DRONE_PITCHES[droneCount % DRONE_PITCHES.length], droneCount); } catch(e) {}

  const drone = {
    group, body, collider, vehicle, synth, dead: false, id: ++droneCount, hitCount: 0, updateMovement, detonatorMesh: detMesh, color, detonatorArmed: false,
    getState: () => droneState, triggerHunt: () => { droneState = 'hunting'; huntCooldown = 6.0; }
  };
  setTimeout(() => { if (!drone.dead) drone.detonatorArmed = true; }, 2500);

  drones.push(drone); document.getElementById('hud-drones').textContent = 'DRONES: ' + drones.filter(d=>!d.dead).length;
}

function killDrone(drone) {
  if (drone.dead) return; drone.dead = true;
  const R = window.RAPIER, pos = drone.group.position;
  playExplosion(); spawnExplosionEffect(drone.group);

  drone.group.getChildMeshes().forEach(n => {
    if (n.material) {
      n.material = n.material.clone();
      n.material.albedoColor = BABYLON.Color3.FromHexString("#ff8800");
      n.material.emissiveColor = BABYLON.Color3.FromHexString("#ff4400").scale(3);
    }
  });

  yukaManager.remove(drone.vehicle);
  const oldC = drone.collider, oldB = drone.body;
  drone.body = physicsWorld.createRigidBody(R.RigidBodyDesc.dynamic().setTranslation(pos.x, pos.y, pos.z));
  drone.collider = physicsWorld.createCollider(R.ColliderDesc.cuboid(0.5, 0.5, 0.5).setMass(2).setRestitution(0.3).setFriction(0.5), drone.body);
  drone.body.setLinvel({ x:(Math.random()-0.5)*8, y:5, z:(Math.random()-0.5)*8 }, true);
  drone.body.setAngvel({ x:(Math.random()-0.5)*10, y:(Math.random()-0.5)*10, z:(Math.random()-0.5)*10 }, true);

  setTimeout(() => { try { physicsWorld.removeCollider(oldC, true); } catch(e){} try { physicsWorld.removeRigidBody(oldB); } catch(e){} }, 50);

  if (drone.synth) {
    try { drone.synth.osc1.stop(); drone.synth.osc2.stop(); drone.synth.osc3.stop();
      setTimeout(() => { try { drone.synth.osc1.dispose(); drone.synth.osc2.dispose(); drone.synth.osc3.dispose(); drone.synth.panner.dispose(); drone.synth.vol.dispose(); drone.synth.filter.dispose(); } catch(e){} }, 200);
    } catch(e) {} drone.synth = null;
  }

  setTimeout(() => {
    drone.group.dispose();
    try { physicsWorld.removeCollider(drone.collider, true); } catch(e){} try { physicsWorld.removeRigidBody(drone.body); } catch(e){}
    const idx = drones.indexOf(drone); if (idx >= 0) drones.splice(idx, 1);
    document.getElementById('hud-drones').textContent = 'DRONES: ' + drones.filter(d=>!d.dead).length;
  }, 5000);
}

function tickDrones(dt) {
  drones.forEach(drone => {
    if (drone.dead && drone.body) {
      const cached = _physCache.deadDrones[drone.id];
      if (cached) { drone.group.position.set(cached.pos.x, cached.pos.y, cached.pos.z); drone.group.rotationQuaternion.copyFromFloats(cached.rot.x, cached.rot.y, cached.rot.z, cached.rot.w); }
      return;
    }
    if (!drone.dead) {
      const qr = _rayQueryResults[drone.id]; drone.updateMovement(dt, qr ? qr.wallPush : null);
      if (drone.synth) updateDroneSpatial(drone.synth, drone.group.position);
      drone.group.getChildMeshes().forEach((c, i) => { if (i>=1 && i<=4) c.rotation.y += dt * 20 * (1 + drone.id * 0.3); });
      if (drone.detonatorArmed) checkDetonatorCollision(drone);
    }
  });
}

function checkDetonatorCollision(drone) {
  if (!player.rigidBody) return;
  const detWorld = drone.detonatorMesh.getAbsolutePosition();
  const pp = camera.globalPosition;
  if (BABYLON.Vector3.DistanceSquared(detWorld, pp) < 0.64) { killDrone(drone); return; }
  for (const other of drones) {
    if (other === drone || other.dead) continue;
    if (BABYLON.Vector3.DistanceSquared(detWorld, other.group.position) < 1.44) { killDrone(drone); killDrone(other); return; }
  }
  const res = _rayQueryResults[drone.id];
  if (res && res.detonatorHit) killDrone(drone);
}

            p.mesh.isVisible = true; p.mesh.position.set((Math.random()-0.5)*0.4, (Math.random()-0.5)*0.2, (Math.random()-0.5)*0.4); p.vel.set((Math.random()-0.5)*1.4, 2+Math.random()*3, (Math.random()-0.5)*1.4);
            p.life = 0.4+Math.random()*0.6; p.maxLife = p.life; p.size = 0.5+Math.random()*0.7; p.mesh.scaling.setAll(p.size); p.mat.alpha = 1.0;
          }
        }
      }
      this.smokeTimer += dt;
      if (t < 4.2 && this.smokeTimer >= 0.07) { this.smokeTimer = 0; const sp = spawnSmokePuff(new BABYLON.Vector3((Math.random()-0.5)*0.3, -0.1, (Math.random()-0.5)*0.3), fxGroup); this.allParticles.push(...sp); }
      for (const p of this.allParticles) {
        if (p.life <= 0) continue; p.life -= dt; const norm = Math.max(0, p.life / p.maxLife);
        p.mesh.position.addInPlace(p.vel.scale(dt)); p.vel.y += -3.5 * dt;
        p.mesh.scaling.setAll(p.size * (1 + p.growRate * (1 - norm))); p.mat.alpha = norm < p.fadeStart ? norm / p.fadeStart : 1.0; p.mesh.rotation.z += dt * 0.4 * (p.size > 0.5 ? 1 : -1);
        if (p.life <= 0) p.mesh.isVisible = false;

}
function tickExplosions(dt) { for (let i=activeEffects.length-1; i>=0; i--) { const fx = activeEffects[i]; fx.update(dt); if (fx.elapsed >= fx.totalLife) activeEffects.splice(i, 1); } }

// ============================================================
//  BULLETS
// ============================================================
const bullets =[];
function shootBullet() {
  if (!physicsReady) return; 
  Tone.start().catch(()=>{});

  playGunshot(); 
  player.shotsFired++;
  
  const origin = camera.globalPosition.clone();
  // Safe cross-browser way to pull the camera's forward vector (-Z for Right-Handed System)
  const dir = camera.getDirection(new BABYLON.Vector3(0, 0, -1)).normalize();

  const mesh = BABYLON.MeshBuilder.CreateSphere("bullet", {diameter: CONFIG.bulletRadius*2, segments: 6}, scene);
  const mat = new BABYLON.StandardMaterial("bmat", scene); 
  mat.diffuseColor = new BABYLON.Color3(1, 1, 0); 
  mat.emissiveColor = new BABYLON.Color3(1, 0.6, 0); 
  mat.disableLighting = true;
  mesh.material = mat; 
  mesh.position.copyFrom(origin);
  
  bullets.push({ mesh, dir, speed: CONFIG.bulletSpeed, life: CONFIG.bulletLife, dead: false });
}

function tickBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    if (b.dead) { bullets.splice(i, 1); continue; }
    b.life -= dt;
    if (b.life <= 0) { b.mesh.dispose(); b.dead = true; bullets.splice(i, 1); continue; }

    b.mesh.position.addInPlace(b.dir.scale(b.speed * dt));
    let hitSomething = false;
    drones.forEach(drone => {
      if (drone.dead || hitSomething) return;
      if (BABYLON.Vector3.Distance(b.mesh.position, drone.group.position) < 1.0) {
        if (BABYLON.Vector3.Distance(b.mesh.position, drone.detonatorMesh.getAbsolutePosition()) < 0.35) killDrone(drone);
        else {
          drone.hitCount++; playBulletHit(); drone.triggerHunt();
          const ent = drone.vehicle, knockDir = new BABYLON.Vector3(b.dir.x, 0.5, b.dir.z).normalize();
          ent.position.x += knockDir.x * 0.5; ent.position.y += knockDir.y * 0.3; ent.position.z += knockDir.z * 0.5;

          drone.group.getChildMeshes().forEach(child => {
            if (child.material) {
              const orig = child.material.emissiveColor.clone();
              child.material.emissiveColor = new BABYLON.Color3(1,1,1);
              setTimeout(() => { child.material.emissiveColor = orig; }, 80);
            }
          });
          if (drone.hitCount >= CONFIG.hitsToDetonate) killDrone(drone);
        }
        hitSomething = true;
      }
    });
    if (hitSomething) { b.mesh.dispose(); b.dead = true; bullets.splice(i, 1); }
  }
}

// ============================================================
//  SPRITE SCATTER (THIN INSTANCES)
// ============================================================
const atlasTextures = {};
function loadSpriteAssets(assets) {
  const sheets = assets.filter(a => a.type === 'spritesheet');
  if (!sheets.length) return Promise.resolve();
  return new Promise(resolve => {
    let remaining = sheets.length;
    sheets.forEach(a => {
      const tex = new BABYLON.Texture(a.src, scene, undefined, undefined, undefined, () => {
        tex.gammaSpace = true; atlasTextures[a.id] = { tex, category: a.category, id: a.id };
        if (--remaining === 0) resolve();
      }, () => { if (--remaining === 0) resolve(); });
    });
  });
}

function makeBillboardMat(sheetId) {
  const entry = atlasTextures[sheetId]; if (!entry) return null;
  const grid = CONFIG.sheetGrids[sheetId] || { cols: 4, rows: 2 };
  const col = Math.floor(Math.random() * grid.cols), row = Math.floor(Math.random() * grid.rows);
  const t = entry.tex.clone();
  t.uScale = 1 / grid.cols; t.vScale = 1 / grid.rows; t.uOffset = col / grid.cols; t.vOffset = 1 - (row + 1) / grid.rows;
  const mat = new BABYLON.StandardMaterial("bbMat", scene); mat.diffuseTexture = t; mat.diffuseTexture.hasAlpha = true; mat.useAlphaFromDiffuseTexture = true; mat.alphaCutOff = 0.15; mat.transparencyMode = BABYLON.Material.MATERIAL_ALPHATEST; mat.disableLighting = true; mat.backFaceCulling = false; return mat;
}

function makeBillboard(sheetId, worldPos, w, h) {
  const mat = makeBillboardMat(sheetId); if (!mat) return null;
  const mesh = BABYLON.MeshBuilder.CreatePlane("bb", {width: w, height: h}, scene);
  mesh.material = mat; mesh.position.copyFrom(worldPos); mesh.position.y += h * 0.5; mesh.billboardMode = BABYLON.Mesh.BILLBOARDMODE_Y; return mesh;
}

const vegInstances =[];
function buildVegInstancedMeshes(data, capacity) {
  const cells =[];
  data.assets.filter(a => a.type === 'spritesheet' && a.category === 'vegetation').forEach(a => {
    const grid = CONFIG.sheetGrids[a.id] || { cols: 4, rows: 2 };
    for (let r = 0; r < grid.rows; r++) for (let c = 0; c < grid.cols; c++) cells.push({ sheetId: a.id, col: c, row: r, grid });
  });

  cells.forEach(cell => {
    const entry = atlasTextures[cell.sheetId]; if (!entry) return;
    const t = entry.tex.clone(); t.uScale = 1 / cell.grid.cols; t.vScale = 1 / cell.grid.rows; t.uOffset = cell.col / cell.grid.cols; t.vOffset = 1 - (cell.row + 1) / cell.grid.rows;
    const mat = new BABYLON.StandardMaterial("vegMat", scene); mat.diffuseTexture = t; mat.diffuseTexture.hasAlpha = true; mat.useAlphaFromDiffuseTexture = true; mat.alphaCutOff = 0.15; mat.transparencyMode = BABYLON.Material.MATERIAL_ALPHATEST; mat.disableLighting = true; mat.backFaceCulling = false;
    const mesh = BABYLON.MeshBuilder.CreatePlane("vp", {width: 1, height: 1}, scene); mesh.material = mat;
    vegInstances.push({ mesh, count: 0, buffer: new Float32Array(capacity * 16), storedData:[], capacity });
  });
}

function addVegInstance(x, y, z, w, h) {
  if (!vegInstances.length) return; const si = Math.floor(Math.random() * vegInstances.length); const slot = vegInstances[si];
  if (slot.count >= slot.capacity) return;
  slot.storedData.push(x, y + h * 0.5, z, w, h); slot.count++;
}

function sampleTerrainAt(x, z, terrainMeshes) {
  const ray = new BABYLON.Ray(new BABYLON.Vector3(x, 300, z), new BABYLON.Vector3(0, -1, 0), 600);
  const hit = scene.pickWithRay(ray, m => terrainMeshes.includes(m));
  if (!hit || !hit.hit) return null; return { y: hit.pickedPoint.y, normal: hit.getNormal(true) };
}

const buildingPositions =[];
async function scatterProps(data, terrainMeshes) {
  const SC = CONFIG.scatter, rng = (min, max) => min + Math.random() * (max - min);
  const byCategory = {}; data.assets.filter(a => a.type === 'spritesheet').forEach(a => { if (!byCategory[a.category]) byCategory[a.category] =[]; byCategory[a.category].push(a.id); });
  const rockSheets = byCategory['rocks'] || [], stumpSheets = byCategory['stumps'] || [], wallSheets = byCategory['buildings'] ||[];
  const randSheet = arr => arr.length ? arr[Math.floor(Math.random()*arr.length)] : null;

  const tb = { min: new BABYLON.Vector3(Infinity, Infinity, Infinity), max: new BABYLON.Vector3(-Infinity, -Infinity, -Infinity) };
  terrainMeshes.forEach(m => { m.computeWorldMatrix(true); const {minimumWorld, maximumWorld} = m.getBoundingInfo().boundingBox; tb.min.minimizeInPlace(minimumWorld); tb.max.maximizeInPlace(maximumWorld); });
  const bmin = tb.min, bw = tb.max.x - tb.min.x, bd = tb.max.z - tb.min.z;

  const vegCells = Math.ceil(Math.sqrt(SC.vegSampleCount)), vegCellW = bw / vegCells, vegCellD = bd / vegCells;
  buildVegInstancedMeshes(data, Math.ceil(SC.vegSampleCount * SC.vegFlatDensity * 1.8));

  for (let gx = 0; gx < vegCells; gx++) {
    if (gx % 60 === 0) await new Promise(r => setTimeout(r, 0));
    for (let gz = 0; gz < vegCells; gz++) {
      const x = bmin.x + (gx + Math.random()) * vegCellW, z = bmin.z + (gz + Math.random()) * vegCellD, s = sampleTerrainAt(x, z, terrainMeshes);
      if (!s) continue; const slopeUp = BABYLON.Vector3.Dot(s.normal, new BABYLON.Vector3(0,1,0));
      if (slopeUp <= SC.steepThreshold ? Math.random() < SC.vegSteepDensity : (slopeUp >= SC.flatThreshold ? Math.random() < SC.vegFlatDensity : false)) {
        const sc = rng(0.6, 1.4); addVegInstance(x, s.y, z, SC.vegSize.w * sc, SC.vegSize.h * sc);
        if (slopeUp <= SC.steepThreshold && Math.random() < 0.6) addVegInstance(x + rng(-0.8,0.8), s.y, z + rng(-0.8,0.8), SC.vegSize.w * rng(0.5,1.1), SC.vegSize.h * rng(0.5,1.1));
      }
    }
  }

  const propCells = Math.ceil(Math.sqrt(SC.sampleCount)), propCellW = bw / propCells, propCellD = bd / propCells;
  for (let gx = 0; gx < propCells; gx++) {
    if (gx % 60 === 0) await new Promise(r => setTimeout(r, 0));
    for (let gz = 0; gz < propCells; gz++) {
      const x = bmin.x + (gx + Math.random()) * propCellW, z = bmin.z + (gz + Math.random()) * propCellD, s = sampleTerrainAt(x, z, terrainMeshes);
      if (!s || BABYLON.Vector3.Dot(s.normal, new BABYLON.Vector3(0,1,0)) < SC.flatThreshold) continue;
      const roll = Math.random(), pos = new BABYLON.Vector3(x, s.y, z);
      if (s.y > SC.elevationSplit) {
        if (roll < SC.flatRockDensity && rockSheets.length) makeBillboard(randSheet(rockSheets), pos, SC.rockSize.w * rng(0.8,1.5), SC.rockSize.h * rng(0.7,1.3));
        else if (roll < SC.flatRockDensity + SC.flatStumpDensity && stumpSheets.length) makeBillboard(randSheet(stumpSheets), pos, SC.stumpSize.w * rng(0.8,1.2), SC.stumpSize.h * rng(0.8,1.2));
        else if (roll < SC.flatRockDensity + SC.flatStumpDensity + SC.flatBoxDensity && wallSheets.length) makeBillboard(randSheet(wallSheets), pos, SC.boxSize.w * rng(0.7,1.3), SC.boxSize.h * rng(0.7,1.3));
      } else if (roll < SC.flatBoxDensity && wallSheets.length) makeBillboard(randSheet(wallSheets), pos, SC.boxSize.w * rng(0.8,1.4), SC.boxSize.h * rng(0.8,1.4));
    }
  }

  buildingPositions.forEach(bp => {
    const hx = bp.hx || SC.buildingRingRadius, hz = bp.hz || SC.buildingRingRadius;[{ offset: -0.5, density: 1.00, sizeMin: 1.1, sizeMax: 2.4, spacing: 0.9 }, { offset: 0.5, density: 0.98, sizeMin: 0.9, sizeMax: 2.0, spacing: 1.0 }, { offset: 1.8, density: 0.85, sizeMin: 0.7, sizeMax: 1.6, spacing: 1.2 }, { offset: 3.5, density: 0.65, sizeMin: 0.5, sizeMax: 1.2, spacing: 1.6 }, { offset: 6.0, density: 0.35, sizeMin: 0.4, sizeMax: 0.9, spacing: 2.2 }].forEach(layer => {
      const ox = hx + layer.offset, oz = hz + layer.offset, sp = layer.spacing;[{ axis: 'x', from: -ox, to: ox, fixed: -oz, fx: false }, { axis: 'x', from: -ox, to: ox, fixed: +oz, fx: false }, { axis: 'z', from: -oz, to: oz, fixed: -ox, fx: true }, { axis: 'z', from: -oz, to: oz, fixed: +ox, fx: true }].forEach(side => {
        const len = side.to - side.from, steps = Math.ceil(len / sp);
        for (let i = 0; i <= steps; i++) {
          if (Math.random() > layer.density) continue;
          const t = side.from + (i / steps) * len + rng(-sp * 0.35, sp * 0.35), perp = rng(-0.6, 0.6), wx = bp.x + (side.fx ? side.fixed + perp : t), wz = bp.z + (side.fx ? t : side.fixed + perp);
          const s = sampleTerrainAt(wx, wz, terrainMeshes), sc = rng(layer.sizeMin, layer.sizeMax);
          addVegInstance(wx, s ? s.y : bp.y, wz, SC.vegSize.w * sc, SC.vegSize.h * sc);
        }
      });
    });
  });
}

let _lastBillboardYaw = null;
function tickBillboards() {
  const camYaw = pointerLock.euler.y, faceY = camYaw + Math.PI;
  if (faceY !== _lastBillboardYaw) {
    const quat = BABYLON.Quaternion.RotationAxis(new BABYLON.Vector3(0,1,0), faceY);
    vegInstances.forEach(slot => {
      if (slot.count === 0) return;
      for (let i = 0; i < slot.count; i++) {
        const base = i * 5, p = new BABYLON.Vector3(slot.storedData[base], slot.storedData[base+1], slot.storedData[base+2]), s = new BABYLON.Vector3(slot.storedData[base+3], slot.storedData[base+4], 1);
        BABYLON.Matrix.Compose(s, quat, p).copyToArray(slot.buffer, i * 16);
      }
      slot.mesh.thinInstanceSetBuffer("matrix", slot.buffer.subarray(0, slot.count * 16), 16, false);
    });
    _lastBillboardYaw = faceY;
  }
}

// ============================================================
//  BOOT
// ============================================================
async function loadScene() {
  const res = await fetch(SCENE_JSON); const data = await res.json();
  _spriteLoadPromise = loadSpriteAssets(data.assets);
  data.buildings.forEach(b => {
    if (b.class !== 'terrain') {
      const [bx, by, bz] = b.position.split(' ').map(Number),[sx, sy, sz] = (b.scale||'1 1 1').split(' ').map(n => Number(n) * 1.15);
      buildingPositions.push({ x: bx, y: by, z: bz, hx: sx * 0.55, hz: sz * 0.55 });
    }
  });
  data.waypoints.forEach(wp => { const[x,y,z] = wp.position.split(' ').map(Number); flightWaypoints.push(new YUKA.Vector3(x, y, z)); });
  const h = CONFIG.droneFlightHeight;
  data.buildings.forEach(b => {
    const[bx, by, bz] = b.position.split(' ').map(Number), r = 6;
    [[bx + r, h + 1, bz],[bx, h - 1, bz + r],[bx - r, h + 2, bz],[bx, h, bz - r]].forEach(([wx, wy, wz]) => flightWaypoints.push(new YUKA.Vector3(wx, wy, wz)));
  });
  loadBuildings(data); _sceneData = data;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

let lastTime = performance.now();
engine.runRenderLoop(() => {
  const now = performance.now(), dt = Math.min((now - lastTime) / 1000, 0.1); lastTime = now;
  stepPhysics(dt); syncPhysicsReads(); queryPhysics();
  yukaManager.update(yukaTime.update().getDelta());
  tickPlayer(dt); tickLadders(); tickDrones(dt); tickBullets(dt); tickBillboards(); tickExplosions(dt);
  scene.render();
});

async function boot() {
  await initPhysics(); initLadders(); await loadScene(); await sleep(500); initPlayer();
  document.getElementById('loading').classList.add('hidden');
  
  // Single initializer to prevent issues with strict autoplay locking rules
  const startAudio = async () => { 
    if (!toneReady) {
        await Tone.start(); 
        initAudio(); 
    }
  };
  
  // We use Babylon's own pointer hook, but bind Tone to early dom touches just in case
  document.addEventListener('click', startAudio, { once: true }); 
  document.addEventListener('keydown', startAudio, { once: true });
}

boot();
</script>
