<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Drone Wars - PlayCanvas</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; background: #111; color: #fff;
      font-size: 22px; z-index: 100; flex-direction: column; gap: 12px;
    }
    #loading.hidden { display: none; }
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 16px; height: 16px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.8);
    }
    #crosshair::before { width: 2px; height: 16px; left: 7px; top: 0; }
    #crosshair::after  { width: 16px; height: 2px; left: 0; top: 7px; }
    #hud {
      position: fixed; bottom: 20px; left: 20px; color: #0f0; font-size: 13px;
      font-family: monospace; text-shadow: 0 0 4px #0f0; pointer-events: none; line-height: 1.8;
    }
    #info {
      position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.6); font-size: 12px; pointer-events: none; text-align: center; line-height: 1.6;
    }
  </style>

  <!-- PlayCanvas -->
  <script src="https://code.playcanvas.com/playcanvas-stable.min.js"></script>
  <!-- Tone.js Audio -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  <!-- Note: We no longer load Ammo.js via a script tag. PlayCanvas handles it dynamically below. -->
</head>
<body>

<div id="loading">
  <div>DRONE WARS - PLAYCANVAS</div>
  <div style="font-size:14px; color:#888" id="load-status">Initializing System...</div>
</div>

<div id="crosshair"></div>
<div id="hud">
  <div id="hud-drones">DRONES: 0</div>
  <div id="hud-grounded">GROUNDED: YES</div>
  <div id="hud-pos">POS: 0.0, 0.0, 0.0</div>
  <div id="hud-duck">DUCK: NO</div>
  <div id="hud-ammo">SHOTS FIRED: 0</div>
</div>
<div id="info">
  WASD — Move &nbsp;|&nbsp; MOUSE — Look &nbsp;|&nbsp; SPACE — Jump &nbsp;|&nbsp; C — Duck &nbsp;|&nbsp; F — FreeCam &nbsp;|&nbsp; 0 — Spawn Drone &nbsp;|&nbsp; CLICK — Shoot/Lock
</div>

<canvas id="application-canvas"></canvas>

<script>
// ============================================================
//  DRONE WARS — PlayCanvas Edition
// ============================================================

const CONFIG = {
  launchPoint: new pc.Vec3(-13, 2, 2.8),
  droneRiseHeight: 8, droneMaxSpeed: 5, dronePathRadius: 4.0, droneFlightHeight: 2.5,
  hitsToDetonate: 10,
  bulletSpeed: 60, bulletRadius: 0.12, bulletLife: 3.0,
  freeFlyCamSpeed: 20
};

const PLAYER = { height: 1.6, radius: 0.4, moveForce: 300, jumpForce: 350, duckHeight: 0.9 };
const DRONE_PITCHES =[110, 130.81, 164.81, 196, 246.94, 293.66, 329.63, 392];

let app, playerEntity, cameraEntity, sceneData;
let drones = [], bullets =[], flightWaypoints = [], activeEffects =[];
let physicsReady = false, toneReady = false;
let droneCount = 0, shotsFired = 0;
let isFreeCam = false, isDucking = false;

const elLoading = document.getElementById('loading');
const elStatus = document.getElementById('load-status');
const Vec3 = pc.Vec3;

// ============================================================
//  INITIALIZE ENGINE
// ============================================================
function initApp() {
  console.log("🎮 Initializing PlayCanvas Application...");
  const canvas = document.getElementById('application-canvas');
  app = new pc.Application(canvas, {
    mouse: new pc.Mouse(document.body),
    keyboard: new pc.Keyboard(window),
    graphicsDeviceOptions: { antialias: true, alpha: false }
  });
  app.start();
  app.setCanvasFillMode(pc.FILLMODE_FILL_WINDOW);
  app.setCanvasResolution(pc.RESOLUTION_AUTO);
  window.addEventListener('resize', () => app.resizeCanvas());

  // Lighting & Sky
  app.scene.ambientLight = new pc.Color(0.8, 0.8, 0.8);
  
  const light = new pc.Entity('DirectionalLight');
  light.addComponent('light', {
    type: 'directional',
    color: new pc.Color(255/255, 253/255, 232/255),
    intensity: 1.2,
    castShadows: true,
    shadowBias: 0.2,
    shadowResolution: 2048
  });
  light.setLocalEulerAngles(45, -45, 0);
  app.root.addChild(light);

  app.scene.fog = pc.FOG_LINEAR;
  app.scene.fogColor = new pc.Color(135/255, 206/255, 235/255);
  app.scene.fogStart = 100;
  app.scene.fogEnd = 800;

  // Camera Rig
  const cameraGroup = new pc.Entity('CameraGroup');
  cameraEntity = new pc.Entity('Camera');
  cameraEntity.addComponent('camera', {
    clearColor: new pc.Color(135/255, 206/255, 235/255),
    farClip: 5000,
    fov: 75
  });
  cameraGroup.addChild(cameraEntity);
  app.root.addChild(cameraGroup);
  
  console.log("✅ PlayCanvas initialized.");
}

// ============================================================
//  INPUT / POINTER LOCK
// ============================================================
const pointerLock = { euler: new pc.Vec3(), locked: false };

function setupInput() {
  app.mouse.on(pc.EVENT_MOUSEDOWN, async (e) => {
    if (e.button === pc.MOUSEBUTTON_LEFT) {
      if (!pointerLock.locked) {
        if (!toneReady) { 
          try { 
            await Tone.start(); 
            initAudio(); 
            toneReady = true; 
            console.log("🔊 Audio Context Started.");
          } catch(err){
            console.error("❌ Audio failed to start:", err);
          }
        }
        app.mouse.enablePointerLock();
      } else {
        shootBullet();
      }
    }
  });

  app.mouse.on(pc.EVENT_MOUSEMOVE, (e) => {
    if (!pointerLock.locked) return;
    const sens = 0.15;
    pointerLock.euler.x -= e.dy * sens;
    pointerLock.euler.y -= e.dx * sens;
    pointerLock.euler.x = pc.math.clamp(pointerLock.euler.x, -85, 85);
  });

  document.addEventListener('pointerlockchange', () => {
    pointerLock.locked = !!document.pointerLockElement;
  });

  app.keyboard.on(pc.EVENT_KEYDOWN, (e) => {
    if (e.key === pc.KEY_F) toggleFreeCam();
    if (e.key === pc.KEY_0) spawnDrone();
  });
}

// ============================================================
//  ASSET LOADING & ENVIRONMENT
// ============================================================
function loadScene() {
  console.log("📦 Starting to load Scene Assets...");
  elStatus.innerText = 'Loading Scene Details...';
  
  sceneData = {
    assets:[
      { id: "object_0_glb", src: "https://scottgrocott.github.io/metal_throne/assets/img/mood_boards/copilot/object_0.glb" },
      { id: "object_1_glb", src: "https://scottgrocott.github.io/metal_throne/assets/img/mood_boards/copilot/object_1.glb" },
      { id: "object_3_glb", src: "https://scottgrocott.github.io/metal_throne/assets/img/mood_boards/copilot/object_3.glb" },
      { id: "terrain",      src: "https://scottgrocott.github.io/metal_throne/assets/models/non-optimized/terrain02.glb" }
    ],
    buildings:[
      { id: "object_0", model: "#object_0_glb", position: "0 2 22.4", scale: "15 15 15", class: "collidable" },
      { id: "object_1", model: "#object_1_glb", position: "-12.1 3 0", scale: "15 15 15", class: "collidable" },
      { id: "object_3", model: "#object_3_glb", position: "0 2 -19.5", scale: "15 15 15", class: "collidable" },
      { id: "terrain",  model: "#terrain",       position: "0 -9 0",   scale: "14 14 14", class: "terrain" }
    ],
    waypoints:[
      { position: "0 20 0" }, { position: "25 25 15" }, { position: "10 15 35" },
      { position: "-25 30 15" }, { position: "-10 18 -25" }, { position: "20 22 -20" }
    ]
  };

  sceneData.waypoints.forEach(wp => {
    const [x,y,z] = wp.position.split(' ').map(Number);
    flightWaypoints.push(new Vec3(x, y, z));
  });

  const groundUrl = 'https://scottgrocott.github.io/metal_throne/assets/img/gpt_ground.png';
  console.log(`🖼️ Loading texture: ${groundUrl}`);

  app.assets.loadFromUrl(groundUrl, 'texture', (err, asset) => {
    if (err) {
      console.warn("⚠️ Ground texture failed to load (will use solid color fallback). Error:", err);
    }

    const groundMat = new pc.StandardMaterial();
    if (!err && asset && asset.resource) {
      groundMat.diffuseMap = asset.resource;
      groundMat.diffuseMapTiling.set(2250, 2250);
      console.log("✅ Ground texture loaded.");
    } else {
      groundMat.diffuse = new pc.Color(0.5, 0.45, 0.35);
    }
    groundMat.metalness = 0.05;
    groundMat.update();

    const ground = new pc.Entity('Ground');
    ground.addComponent('render', { type: 'plane', material: groundMat });
    ground.setLocalScale(10000, 1, 10000);
    ground.addComponent('collision', { type: 'box', halfExtents: new Vec3(5000, 0.5, 5000) });
    ground.addComponent('rigidbody', { type: 'static' });
    app.root.addChild(ground);

    loadBuildings(sceneData, groundMat);
  });
}

function loadBuildings(data, groundMat) {
  let toLoad = data.buildings.length;
  console.log(`🏗️ Start loading ${toLoad} buildings...`);
  
  function finishItem(name) {
    toLoad--;
    console.log(`✅ Loaded ${name}. Remaining to load: ${toLoad}`);
    elStatus.innerText = `Loading models... (${toLoad} left)`;
    if (toLoad <= 0) {
      console.log("🏁 All models loaded. Removing loading screen.");
      elLoading.classList.add('hidden');
      initPlayer();
    }
  }

  if (toLoad === 0) { finishItem("None"); return; }

  data.buildings.forEach(b => {
    const assetObj = data.assets.find(a => a.id === b.model.replace('#', ''));
    if (!assetObj) { 
      console.error(`❌ Could not find asset reference for building model: ${b.model}`);
      finishItem("Unknown"); 
      return; 
    }

    console.log(`⏳ Fetching model: ${assetObj.src}`);

    app.assets.loadFromUrl(assetObj.src, "container", (err, asset) => {
      if (err) {
        console.error(`❌ Failed to load GLB: ${assetObj.src}`, err);
        finishItem(b.id);
        return;
      }

      if (asset && asset.resource) {
        try {
          const entity = asset.resource.instantiateRenderEntity();
          const[px, py, pz] = b.position.split(' ').map(Number);
          const[sx, sy, sz] = (b.scale||'1 1 1').split(' ').map(Number);
          
          entity.setLocalPosition(px, py, pz);
          entity.setLocalScale(sx, sy, sz);

          const renders = entity.findComponents('render');
          renders.forEach(rend => {
            rend.castShadows = b.class !== 'terrain';
            rend.receiveShadows = true;
            if (b.class === 'terrain') rend.material = groundMat;
          });

          if (asset.resource.model) {
            entity.addComponent('collision', { type: 'mesh', asset: asset.resource.model });
            entity.addComponent('rigidbody', { type: 'static', friction: 1, restitution: 0.1 });
          } else {
             console.warn(`⚠️ Model ${b.id} loaded but had no physics mesh associated with it.`);
          }

          app.root.addChild(entity);
        } catch(e) {
          console.error(`❌ Crash while parsing model logic for ${b.id}:`, e);
        }
      }
      finishItem(b.id);
    });
  });
}

// ============================================================
//  PLAYER CONTROLLER
// ============================================================
function initPlayer() {
  console.log("🧍 Initializing Player Controller...");
  playerEntity = new pc.Entity('Player');
  playerEntity.addComponent('collision', { type: 'capsule', radius: PLAYER.radius, height: PLAYER.height });
  playerEntity.addComponent('rigidbody', {
    type: 'dynamic', mass: 80, friction: 0, restitution: 0,
    angularFactor: new Vec3(0, 0, 0), linearDamping: 0.95
  });
  playerEntity.setPosition(0, 5, 0);
  app.root.addChild(playerEntity);

  cameraEntity.parent.reparent(playerEntity);
  cameraEntity.parent.setLocalPosition(0, PLAYER.height/2, 0);
  console.log("✅ Player spawned in scene.");
}

function updatePlayer(dt) {
  if (!playerEntity) return;
  const camGroup = cameraEntity.parent;
  
  if (isFreeCam) {
    camGroup.reparent(app.root);
    const speed = CONFIG.freeFlyCamSpeed * dt;
    const move = new Vec3();
    const fwd = cameraEntity.forward;
    const right = cameraEntity.right;
    
    if (app.keyboard.isPressed(pc.KEY_W)) move.add(fwd);
    if (app.keyboard.isPressed(pc.KEY_S)) move.sub(fwd);
    if (app.keyboard.isPressed(pc.KEY_A)) move.sub(right);
    if (app.keyboard.isPressed(pc.KEY_D)) move.add(right);
    if (app.keyboard.isPressed(pc.KEY_SPACE)) move.add(pc.Vec3.UP);
    if (app.keyboard.isPressed(pc.KEY_C)) move.sub(pc.Vec3.UP);

    if (move.lengthSq() > 0) move.normalize().mulScalar(speed);
    camGroup.translate(move);

    cameraEntity.setLocalEulerAngles(pointerLock.euler.x, pointerLock.euler.y, 0);
    document.getElementById('hud-grounded').innerText = 'GROUNDED: FREECAM';
    return;
  }

  if (camGroup.parent !== playerEntity) camGroup.reparent(playerEntity);
  
  camGroup.setLocalEulerAngles(pointerLock.euler.x, pointerLock.euler.y, 0);

  const fwd = cameraEntity.forward.clone(); fwd.y = 0; fwd.normalize();
  const right = cameraEntity.right.clone(); right.y = 0; right.normalize();
  
  let moveDir = new Vec3();
  if (app.keyboard.isPressed(pc.KEY_W)) moveDir.add(fwd);
  if (app.keyboard.isPressed(pc.KEY_S)) moveDir.sub(fwd);
  if (app.keyboard.isPressed(pc.KEY_A)) moveDir.sub(right);
  if (app.keyboard.isPressed(pc.KEY_D)) moveDir.add(right);
  if (moveDir.lengthSq() > 0) moveDir.normalize();

  const pos = playerEntity.getPosition();
  const down = pos.clone().sub(new Vec3(0, (PLAYER.height/2) + 0.15, 0));
  const groundHit = app.systems.rigidbody.raycastFirst(pos, down);
  const isGrounded = !!groundHit;

  if (app.keyboard.wasPressed(pc.KEY_SPACE) && isGrounded) {
    playerEntity.rigidbody.applyImpulse(0, PLAYER.jumpForce, 0);
  }

  isDucking = app.keyboard.isPressed(pc.KEY_C);
  const targetCamY = isDucking ? (PLAYER.duckHeight/2) : (PLAYER.height/2);
  camGroup.setLocalPosition(0, pc.math.lerp(camGroup.getLocalPosition().y, targetCamY, dt * 10), 0);

  const vel = playerEntity.rigidbody.linearVelocity;
  const targetVel = moveDir.mulScalar(isDucking ? 2.5 : 5.0);
  
  if (isGrounded) {
    const impulseX = (targetVel.x - vel.x) * PLAYER.moveForce * dt;
    const impulseZ = (targetVel.z - vel.z) * PLAYER.moveForce * dt;
    playerEntity.rigidbody.applyImpulse(impulseX, 0, impulseZ);
  }

  document.getElementById('hud-grounded').innerText = `GROUNDED: ${isGrounded?'YES':'NO'}`;
  document.getElementById('hud-duck').innerText = `DUCK: ${isDucking?'YES':'NO'}`;
  document.getElementById('hud-pos').innerText = `POS: ${pos.x.toFixed(1)}, ${pos.y.toFixed(1)}, ${pos.z.toFixed(1)}`;
  document.getElementById('hud-ammo').innerText = `SHOTS: ${shotsFired}`;
}

function toggleFreeCam() {
  isFreeCam = !isFreeCam;
  if (playerEntity) {
    playerEntity.rigidbody.enabled = !isFreeCam;
    if (!isFreeCam) {
      const cp = cameraEntity.parent.getPosition();
      playerEntity.setPosition(cp.x, cp.y, cp.z);
      playerEntity.rigidbody.teleport(cp.x, cp.y, cp.z);
    }
  }
}

// ============================================================
//  DRONES
// ============================================================
function spawnDrone() {
  const lp = CONFIG.launchPoint;
  const drone = new pc.Entity('Drone_' + droneCount++);
  console.log(`🛸 Spawning Drone: ${drone.name}`);
  
  const bodyMesh = new pc.Entity();
  const mat = new pc.StandardMaterial();
  mat.diffuse = new pc.Color(Math.random(), 0.5 + Math.random()*0.5, Math.random()*0.3);
  mat.emissive = mat.diffuse; mat.update();
  bodyMesh.addComponent('render', { type: 'box', material: mat });
  bodyMesh.setLocalScale(1.5, 0.25, 1.5);
  drone.addChild(bodyMesh);

  const detMesh = new pc.Entity();
  const detMat = new pc.StandardMaterial();
  detMat.diffuse = new pc.Color(1,0.2,0); detMat.emissive = new pc.Color(1,0,0); detMat.update();
  detMesh.addComponent('render', { type: 'cylinder', material: detMat });
  detMesh.setLocalScale(0.24, 0.5, 0.24);
  detMesh.setLocalEulerAngles(90, 0, 0);
  detMesh.setLocalPosition(0, 0, 0.9);
  drone.addChild(detMesh);

  drone.setPosition(lp.x, lp.y, lp.z);
  app.root.addChild(drone);

  drone.addComponent('collision', { type: 'sphere', radius: 0.8 });
  drone.addComponent('rigidbody', { type: 'kinematic' });

  drone.ai = {
    state: 'rising', targetY: CONFIG.droneRiseHeight,
    wpIndex: Math.floor(Math.random() * Math.max(1, flightWaypoints.length)),
    velocity: new pc.Vec3(), hitCount: 0, armed: false, synth: null
  };

  setTimeout(() => drone.ai.armed = true, 2500);
  if (toneReady) { try { drone.ai.synth = createDroneSynth(DRONE_PITCHES[droneCount % DRONE_PITCHES.length]); } catch(e){} }

  drones.push(drone);
  updateDroneHUD();
}

function updateDrones(dt) {
  const playerPos = playerEntity ? playerEntity.getPosition() : new Vec3();

  for (let i = drones.length - 1; i >= 0; i--) {
    const drone = drones[i];
    if (drone.isDead) continue;
    
    const ai = drone.ai;
    const pos = drone.getPosition();
    
    let canSee = false;
    const toPlayer = playerPos.clone().sub(pos);
    if (toPlayer.length() < 60) {
      const hit = app.systems.rigidbody.raycastFirst(pos, playerPos);
      if (!hit || hit.entity === playerEntity) canSee = true;
    }

    if (ai.state === 'rising') {
      ai.velocity.set(0, CONFIG.droneMaxSpeed * 0.6, 0);
      if (pos.y >= ai.targetY) ai.state = 'patrol';
    } 
    else if (canSee || ai.state === 'hunting') {
      ai.state = 'hunting';
      const speed = CONFIG.droneMaxSpeed * 1.6;
      const desired = toPlayer.normalize().mulScalar(speed);
      ai.velocity.lerp(ai.velocity, desired, dt * 5);
      if (!canSee) ai.huntTimer = (ai.huntTimer || 4.0) - dt;
      if (ai.huntTimer <= 0) ai.state = 'patrol';
    }
    else {
      const target = flightWaypoints[ai.wpIndex];
      const hOffset = (drone.getGuid().charCodeAt(0) % 5) * 1.2 - 2.4;
      const ty = Math.max(pos.y, CONFIG.droneFlightHeight + hOffset);
      const toTarget = new Vec3(target.x - pos.x, ty - pos.y, target.z - pos.z);
      
      if (toTarget.length() < CONFIG.dronePathRadius) {
        ai.wpIndex = (ai.wpIndex + 1) % flightWaypoints.length;
      }
      ai.velocity.lerp(ai.velocity, toTarget.normalize().mulScalar(CONFIG.droneMaxSpeed), dt * 4);
    }

    const nextPos = pos.clone().add(ai.velocity.clone().mulScalar(dt));
    drone.setPosition(nextPos);
    
    if (ai.velocity.lengthSq() > 0.1) {
      drone.lookAt(nextPos.clone().add(ai.velocity));
    }

    if (ai.armed && toPlayer.length() < 1.5) killDrone(drone);
    if (ai.synth) updateDroneAudio(ai.synth, pos, playerPos);
  }
}

function killDrone(drone) {
  drone.isDead = true;
  playExplosion(drone.getPosition());
  spawnExplosionFX(drone.getPosition());

  drone.rigidbody.type = pc.RIGIDBODY_TYPE_DYNAMIC;
  drone.rigidbody.mass = 2;
  drone.rigidbody.activate();
  drone.rigidbody.applyImpulse((Math.random()-0.5)*10, 8, (Math.random()-0.5)*10);

  drone.children[0].render.material.diffuse = new pc.Color(1, 0.5, 0);
  drone.children[0].render.material.update();

  if (drone.ai.synth) {
    try { drone.ai.synth.osc1.stop(); drone.ai.synth.osc2.stop(); drone.ai.synth.osc3.stop(); } catch(e){}
  }

  setTimeout(() => {
    drone.destroy();
    drones = drones.filter(d => d !== drone);
    updateDroneHUD();
  }, 5000);
}

function updateDroneHUD() {
  document.getElementById('hud-drones').innerText = `DRONES: ${drones.filter(d=>!d.isDead).length}`;
}

// ============================================================
//  COMBAT & FX
// ============================================================
function shootBullet() {
  playGunshot();
  shotsFired++;

  const bullet = new pc.Entity('Bullet');
  const mat = new pc.StandardMaterial();
  mat.diffuse = new pc.Color(1, 1, 0); mat.emissive = new pc.Color(1, 0.8, 0); mat.update();
  
  bullet.addComponent('render', { type: 'sphere', material: mat });
  bullet.setLocalScale(CONFIG.bulletRadius*2, CONFIG.bulletRadius*2, CONFIG.bulletRadius*2);
  
  const camPos = cameraEntity.getPosition();
  const camFwd = cameraEntity.forward;
  bullet.setPosition(camPos);
  app.root.addChild(bullet);

  bullets.push({ entity: bullet, dir: camFwd.clone(), life: CONFIG.bulletLife });
}

function updateBullets(dt) {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.life -= dt;
    
    if (b.life <= 0) {
      b.entity.destroy();
      bullets.splice(i, 1);
      continue;
    }

    const pos = b.entity.getPosition();
    const move = b.dir.clone().mulScalar(CONFIG.bulletSpeed * dt);
    const nextPos = pos.clone().add(move);
    b.entity.setPosition(nextPos);

    let hit = false;
    for (let drone of drones) {
      if (drone.isDead) continue;
      const dPos = drone.getPosition();
      if (nextPos.distance(dPos) < 1.0) {
        playBulletHit();
        drone.ai.hitCount++;
        drone.ai.state = 'hunting';
        
        const kb = b.dir.clone().mulScalar(0.5); kb.y = 0.5;
        drone.setPosition(dPos.add(kb));

        if (drone.ai.hitCount >= CONFIG.hitsToDetonate) killDrone(drone);
        
        hit = true;
        break;
      }
    }

    if (hit) {
      b.entity.destroy();
      bullets.splice(i, 1);
    }
  }
}

function spawnExplosionFX(pos) {
  const fxGroup = new pc.Entity();
  fxGroup.setPosition(pos);
  app.root.addChild(fxGroup);

  const mat = new pc.StandardMaterial();
  mat.diffuse = new pc.Color(1, 0.4, 0); mat.emissive = new pc.Color(1, 0.2, 0);
  mat.blendType = pc.BLEND_ADDITIVE; mat.opacity = 0.8; mat.depthWrite = false; mat.update();

  const particles =[];
  for (let i = 0; i < 30; i++) {
    const p = new pc.Entity();
    p.addComponent('render', { type: 'plane', material: mat });
    const vel = new pc.Vec3((Math.random()-0.5)*8, Math.random()*8+2, (Math.random()-0.5)*8);
    fxGroup.addChild(p);
    particles.push({ e: p, vel, life: 1.0 + Math.random(), scale: 1.0 + Math.random() });
  }
  activeEffects.push({ group: fxGroup, parts: particles });
}

function updateEffects(dt) {
  const gravity = -5;
  const camPos = cameraEntity.getPosition();

  for (let i = activeEffects.length - 1; i >= 0; i--) {
    const fx = activeEffects[i];
    let allDead = true;

    for (let p of fx.parts) {
      if (p.life > 0) {
        p.life -= dt;
        allDead = false;
        const pos = p.e.getLocalPosition();
        pos.add(p.vel.clone().mulScalar(dt));
        p.vel.y += gravity * dt;
        p.e.setLocalPosition(pos);
        
        const s = p.scale * Math.max(0, p.life);
        p.e.setLocalScale(s, s, s);
        p.e.lookAt(camPos);
        p.e.rotateLocal(90, 0, 0);
      } else {
        p.e.enabled = false;
      }
    }

    if (allDead) {
      fx.group.destroy();
      activeEffects.splice(i, 1);
    }
  }
}

// ============================================================
//  AUDIO
// ============================================================
function initAudio() {
  try {
    const noise = new Tone.Noise('pink').start();
    const filter = new Tone.AutoFilter({ frequency: '0.1', baseFrequency: 200, octaves: 3 }).start();
    const windEnv = new Tone.Volume(-28).toDestination();
    noise.connect(filter); filter.connect(windEnv);
  } catch(e) {}
}

function createDroneSynth(freq) {
  const osc1 = new Tone.Oscillator(freq, 'sawtooth').start();
  const osc2 = new Tone.Oscillator(freq * 1.01, 'square').start();
  const osc3 = new Tone.Oscillator(freq * 2, 'sawtooth').start();
  const dist = new Tone.Distortion(0.4);
  const filter = new Tone.Filter(800, 'lowpass');
  const panner = new Tone.Panner(0);
  const vol = new Tone.Volume(-18).toDestination();

  osc1.connect(dist); osc2.connect(dist); osc3.connect(dist);
  dist.connect(filter); filter.connect(panner); panner.connect(vol);

  return { osc1, osc2, osc3, panner, vol, baseFreq: freq };
}

function updateDroneAudio(synth, dronePos, playerPos) {
  const dist = dronePos.distance(playerPos);
  const vol = dist < 120 ? pc.math.lerp(-4, -60, (dist/120)**2) : -60;
  synth.vol.volume.setTargetAtTime(vol, Tone.now(), 0.8);
  
  const camRight = cameraEntity.right;
  const toDrone = dronePos.clone().sub(playerPos).normalize();
  const pan = pc.math.clamp(toDrone.dot(camRight), -1, 1);
  synth.panner.pan.setTargetAtTime(pan, Tone.now(), 0.1);
}

function playGunshot() {
  if (!toneReady) return;
  const synth = new Tone.MembraneSynth({ pitchDecay: 0.05, envelope: { attack: 0.001, decay: 0.1 } }).toDestination();
  synth.triggerAttackRelease("C2", "8n");
  synth.volume.value = -10;
}
function playBulletHit() {
  if (!toneReady) return;
  const synth = new Tone.Synth({ envelope: { attack: 0.001, decay: 0.1 } }).toDestination();
  synth.triggerAttackRelease("A4", "16n");
}
function playExplosion(pos) {
  if (!toneReady) return;
  const noise = new Tone.NoiseSynth({ noise: { type: "brown" }, envelope: { attack: 0.01, decay: 0.8 } }).toDestination();
  noise.volume.value = -5;
  noise.triggerAttackRelease("4n");
}

// ============================================================
//  MAIN BOOT SEQUENCE
// ============================================================
function boot() {
  console.log("🚀 Booting Game Engine...");
  
  // Configure PlayCanvas built-in Ammo loaded from WasmModule
  pc.WasmModule.setConfig('Ammo', {
    glueUrl:     'https://code.playcanvas.com/ammo.wasm.js',
    wasmUrl:     'https://code.playcanvas.com/ammo.wasm.wasm',
    fallbackUrl: 'https://code.playcanvas.com/ammo.js'
  });

  elStatus.innerText = "Downloading Physics Engine...";
  
  pc.WasmModule.getInstance('Ammo', (err) => {
    if (err) {
      console.error("❌ CRITICAL: Physics Engine failed to download or compile.", err);
      elStatus.innerText = "Error: Physics engine failed to load. Press F12 to see console errors.";
      return;
    }

    console.log("✅ Physics Engine loaded successfully.");
    physicsReady = true;

    try {
      initApp();
      setupInput();
      loadScene();

      app.on('update', (dt) => {
        updatePlayer(dt);
        updateDrones(dt);
        updateBullets(dt);
        updateEffects(dt);
      });
    } catch (e) {
      console.error("❌ CRITICAL: Game crashed during initial setup.", e);
      elStatus.innerText = "Game crashed during setup. Press F12 to see console errors.";
    }
  });
}

window.onload = boot;
</script>
