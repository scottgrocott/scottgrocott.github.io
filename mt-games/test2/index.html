<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Metal Throne</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8DWPPK9QT6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-8DWPPK9QT6');

    // Helper: fire a GA event (used by buttons throughout)
    window._gaEvent = function(eventName, params) {
      if (typeof gtag === 'function') gtag('event', eventName, params || {});
    };
  </script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }

    /* ── Top bar ───────────────────────────────────────────────────────── */
    #top-bar { position:fixed;top:0;left:0;right:0;z-index:10000;height:36px;
      background:rgba(8,12,8,0.92);border-bottom:1px solid #2a3a2a;
      display:flex;align-items:center;gap:12px;padding:0 12px; }
    #top-bar button { background:#0e1e0e;border:1px solid #3a6a3a;color:#8aee8a;
      font-family:inherit;font-size:11px;padding:3px 8px;cursor:pointer;border-radius:2px; }
    #top-bar button:hover { background:#1a3a1a; }

    /* ── Canvas / HUD ──────────────────────────────────────────────────── */
    #renderCanvas { width:100vw;height:100vh;display:block;touch-action:none; }
    #hud { position:fixed;top:42px;left:12px;z-index:9000;color:#8aee8a;font-size:11px;
      pointer-events:none;display:flex;flex-direction:column;gap:4px; }
    #hud .hud-row { display:flex;gap:10px; }
    #hud .hud-label { color:#4a7a4a; }
    #crosshair { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      width:16px;height:16px;pointer-events:none;z-index:9000; }
    #crosshair::before,#crosshair::after { content:'';position:absolute;background:rgba(138,238,138,0.8); }
    #crosshair::before { width:2px;height:16px;left:7px;top:0; }
    #crosshair::after  { width:16px;height:2px;top:7px;left:0; }
    #minimap-canvas { position:fixed;bottom:12px;right:12px;z-index:9000;border:1px solid #2a4a2a;border-radius:2px; }

    /* ── Loading screen ────────────────────────────────────────────────── */
    #loading-screen { position:fixed;inset:0;background:#000d00;z-index:99999;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      color:#8aee8a;font-family:'Courier New',monospace; }
    #loading-screen .load-title { font-size:22px;letter-spacing:0.3em;margin-bottom:18px; }
    #loading-screen .load-sub   { font-size:11px;color:#4a7a4a;letter-spacing:0.15em; }
    #loading-bar-wrap { width:280px;height:4px;background:#1a2a1a;border-radius:2px;margin-top:18px; }
    #loading-bar { height:4px;background:#4aee4a;border-radius:2px;width:0%;transition:width 0.3s; }

    /* ── Play button (appears after load completes) ─────────────────────── */
    #play-btn {
      display:none;
      margin-top:32px;padding:12px 40px;
      background:#0e2a0e;border:1px solid #4aee4a;
      color:#8aee8a;font-family:'Courier New',monospace;
      font-size:14px;letter-spacing:0.2em;cursor:pointer;border-radius:2px;
      transition:background 0.2s,box-shadow 0.2s;
    }
    #play-btn:hover { background:#1a4a1a;box-shadow:0 0 12px rgba(74,238,74,0.3); }
    #play-btn.ready { display:block; animation:btnPulse 1.8s ease-in-out infinite; }
    @keyframes btnPulse {
      0%,100% { box-shadow:0 0 6px rgba(74,238,74,0.2); }
      50%      { box-shadow:0 0 18px rgba(74,238,74,0.5); }
    }

    /* ── Splash title (set dynamically by engine) ──────────────────────── */
    #splash-game-title { font-size:18px;letter-spacing:0.25em;margin-bottom:6px;color:#aaffaa; }
    #splash-game-sub   { font-size:11px;color:#4a8a4a;letter-spacing:0.12em;min-height:16px; }
  </style>

  <!-- BabylonJS core -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <!-- Havok physics WASM — UMD build must load before engine module -->
  <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
  <script>window.HK = HavokPhysics();</script>
  <!-- YUKA AI / Tone.js audio -->
  <script src="https://cdn.jsdelivr.net/npm/yuka@0.7.8/build/yuka.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

  <!-- ── Loading / splash screen ─────────────────────────────────────── -->
  <div id="loading-screen">
    <div id="splash-game-title">METAL THRONE</div>
    <div id="splash-game-sub"></div>
    <div class="load-sub" id="load-status" style="margin-top:24px">INITIALIZING...</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    <button id="play-btn" onclick="window._onPlayBtn()">▶ PLAY</button>
  </div>

  <!-- ── Top bar ──────────────────────────────────────────────────────── -->
  <div id="top-bar">
    <button id="btn-audio" onclick="window._gaEvent('click_audio',{level:window._currentLevel})">🔊 Audio</button>
    <button id="btn-help"  onclick="window._gaEvent('click_help', {level:window._currentLevel})">? Help</button>
  </div>

  <!-- ── Game canvas ─────────────────────────────────────────────────── -->
  <canvas id="renderCanvas"></canvas>
  <div id="crosshair"></div>

  <!-- ── HUD ─────────────────────────────────────────────────────────── -->
  <div id="hud">
    <div class="hud-row">
      <span class="hud-label">HP</span><span id="hud-health">100</span>
      <span class="hud-label">AMMO</span><span id="hud-ammo">∞</span>
      <span class="hud-label">ENEMIES</span><span id="hud-enemies">0</span>
    </div>
    <div class="hud-row"><span class="hud-label">POS</span><span id="hud-pos">0,0,0</span></div>
    <div class="hud-row"><span id="hud-status"></span></div>
  </div>

  <canvas id="minimap-canvas" width="220" height="220"></canvas>

  <script>
    // ── Splash screen API (called by engine via window._setSplashContent / _splashShowPlay) ──

    // Track current level for GA events
    window._currentLevel = new URLSearchParams(location.search).get('level') || '1';

    // Engine calls this after config loads to set title / subtitle
    window._setSplashContent = function(title, subHtml) {
      const t = document.getElementById('splash-game-title');
      const s = document.getElementById('splash-game-sub');
      if (t && title) t.textContent = title.toUpperCase();
      if (s) s.innerHTML = subHtml || '';
    };

    // Engine calls this when loading is 100% complete — reveals the Play button
    window._splashShowPlay = function() {
      const btn = document.getElementById('play-btn');
      if (btn) btn.classList.add('ready');
    };

    // Play button click: dismiss loading screen, request pointer lock, start audio
    window._onPlayBtn = function() {
      const levelId   = window._currentLevel;
      const levelTitle = document.getElementById('splash-game-title')?.textContent || 'unknown';

      // GA event
      window._gaEvent('play_clicked', {
        level_id:    levelId,
        level_title: levelTitle,
      });

      // Hide loading screen
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.transition = 'opacity 0.5s';
        ls.style.opacity    = '0';
        setTimeout(() => { ls.style.display = 'none'; }, 500);
      }

      // Request pointer lock + fire audio unlock event
      const canvas = document.getElementById('renderCanvas');
      if (canvas) canvas.requestPointerLock();
      document.dispatchEvent(new Event('splash-dismissed'));
    };

    // ── Auto-detect engine source (localhost dev vs GitHub Pages) ──
    window._ENGINE_SRC = location.hostname === 'localhost'
      ? 'http://localhost:83/mt-engine/main.js'
      : 'https://scottgrocott.github.io/mt-engine/main.js';
    const _s = document.createElement('script');
    _s.type = 'module'; _s.src = window._ENGINE_SRC;
    document.currentScript.after(_s);
  </script>

</body>
</html>
