<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Metal Throne Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10000;
      height: 36px; background: rgba(8,12,8,0.92);
      border-bottom: 1px solid #2a3a2a;
      display: flex; align-items: center; gap: 12px; padding: 0 12px;
    }
    #top-bar select, #top-bar button {
      background: #0e1e0e; border: 1px solid #3a6a3a; color: #8aee8a;
      font-family: inherit; font-size: 11px; padding: 3px 8px;
      cursor: pointer; border-radius: 2px;
    }
    #top-bar select:hover, #top-bar button:hover { background: #1a3a1a; }
    #top-bar .title { color: #4a7a4a; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; }
    #renderCanvas {
      width: 100vw; height: 100vh; display: block; touch-action: none;
    }
    #hud {
      position: fixed; top: 42px; left: 12px; z-index: 9000;
      color: #8aee8a; font-size: 11px; pointer-events: none;
      display: flex; flex-direction: column; gap: 4px;
    }
    #hud .hud-row { display: flex; gap: 10px; }
    #hud .hud-label { color: #4a7a4a; }
    #crosshair {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 16px; height: 16px; pointer-events: none; z-index: 9000;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(138,238,138,0.8);
    }
    #crosshair::before { width: 2px; height: 16px; left: 7px; top: 0; }
    #crosshair::after  { width: 16px; height: 2px; top: 7px; left: 0; }
    #loading-screen {
      position: fixed; inset: 0; background: #000d00; z-index: 99999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      color: #8aee8a; font-family: 'Courier New', monospace;
    }
    #loading-screen .load-title { font-size: 22px; letter-spacing: 0.3em; margin-bottom: 18px; }
    #loading-screen .load-sub   { font-size: 11px; color: #4a7a4a; letter-spacing: 0.15em; }
    #loading-bar-wrap { width: 280px; height: 4px; background: #1a2a1a; border-radius: 2px; margin-top: 18px; }
    #loading-bar      { height: 4px; background: #4aee4a; border-radius: 2px; width: 0%; transition: width 0.3s; }
    #minimap-canvas {
      position: fixed; bottom: 12px; right: 12px; z-index: 9000;
      border: 1px solid #2a4a2a; border-radius: 2px;
    }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/yuka@0.7.8/build/yuka.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

  <script>
    // Populate config-select with engine-relative paths once main.js sets ENGINE_ROOT.
    // main.js dispatches 'engine-ready' after it resolves ENGINE_ROOT.
    // The select also always includes a "Local (game-config.json)" option.
    window._ENGINE_CONFIGS = [
      { label: 'Test / Sandbox',  file: 'test.json'           },
      { label: 'Drone Wars',      file: 'drone_wars.json'     },
      { label: 'Car Wars',        file: 'car_wars.json'       },
      { label: 'Forklift Wars',   file: 'forklift_wars.json'  },
      { label: 'Metal Throne',    file: 'metal_throne.json'   },
    ];

    window.addEventListener('engine-ready', (e) => {
      const root   = e.detail.engineRoot;
      const select = document.getElementById('config-select');
      select.innerHTML = '';

      // Local config option first
      const localOpt = document.createElement('option');
      localOpt.value = 'game-config.json';
      localOpt.textContent = '📦 Local (game-config.json)';
      select.appendChild(localOpt);

      for (const cfg of window._ENGINE_CONFIGS) {
        const opt = document.createElement('option');
        opt.value = `${root}/assets/configs/${cfg.file}`;
        opt.textContent = cfg.label;
        select.appendChild(opt);
      }
    });
  </script>
</head>
<body>
  <div id="loading-screen">
    <div class="load-title">METAL THRONE ENGINE</div>
    <div class="load-sub" id="load-status">INITIALIZING...</div>
    <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
  </div>

  <div id="top-bar">
    <span class="title">Metal Throne Engine</span>
    <select id="config-select">
      <option value="">Loading...</option>
    </select>
    <button id="btn-editor">⚙ Editor (F)</button>
    <button id="btn-audio">🔊 Audio</button>
    <button id="btn-save">💾 Save JSON</button>
    <button id="btn-deploy">📦 Export Game</button>
    <button id="btn-help">? Help</button>
  </div>

  <canvas id="renderCanvas"></canvas>
  <div id="crosshair"></div>

  <div id="hud">
    <div class="hud-row">
      <span class="hud-label">HP</span><span id="hud-health">100</span>
      <span class="hud-label">AMMO</span><span id="hud-ammo">∞</span>
      <span class="hud-label">ENEMIES</span><span id="hud-enemies">0</span>
    </div>
    <div class="hud-row">
      <span class="hud-label">POS</span><span id="hud-pos">0,0,0</span>
    </div>
    <div class="hud-row"><span id="hud-status"></span></div>
  </div>

  <canvas id="minimap-canvas" width="220" height="220"></canvas>

  <!-- src is relative to THIS index.html — works in any directory -->
  <script type="module" src="main.js"></script>
</body>
</html>
