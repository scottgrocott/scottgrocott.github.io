<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Metal Throne — Editor</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
    #top-bar { position:fixed;top:0;left:0;right:0;z-index:10000;height:36px;
      background:rgba(8,12,8,0.95);border-bottom:1px solid #2a3a2a;
      display:flex;align-items:center;gap:12px;padding:0 12px; }
    #top-bar button { background:#0e1e0e;border:1px solid #3a6a3a;color:#8aee8a;
      font-family:inherit;font-size:11px;padding:3px 8px;cursor:pointer;border-radius:2px; }
    #top-bar button:hover { border-color:#6aee6a; }
    #top-bar .config-url { flex:1;background:#050e05;border:1px solid #2a4a2a;
      color:#6aee6a;font-family:inherit;font-size:10px;padding:2px 6px;border-radius:2px; }
    #renderCanvas { width:100vw;height:100vh;display:block;touch-action:none; }
    #hud { position:fixed;top:42px;left:12px;z-index:9000;color:#8aee8a;font-size:11px;
      pointer-events:none;display:flex;flex-direction:column;gap:4px; }
    #hud .hud-row { display:flex;gap:10px; }
    #hud .hud-label { color:#4a7a4a; }
    #crosshair { position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
      width:16px;height:16px;pointer-events:none;z-index:9000; }
    #crosshair::before,#crosshair::after { content:'';position:absolute;background:rgba(138,238,138,0.6); }
    #crosshair::before { width:2px;height:16px;left:7px;top:0; }
    #crosshair::after  { width:16px;height:2px;top:7px;left:0; }
    #minimap-canvas { position:fixed;bottom:12px;right:12px;z-index:9000;
      border:1px solid #2a4a2a;border-radius:2px; }
    #editor-hint { position:fixed;bottom:14px;left:12px;z-index:9000;
      color:#3a6a3a;font-size:10px;pointer-events:none; }
    /* Hide OS cursor over canvas — game crosshair takes over */
    #renderCanvas.game-focus { cursor:none; }
  </style>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
  <script src="https://cdn.babylonjs.com/havok/HavokPhysics_umd.js"></script>
  <script>window.HK = HavokPhysics();</script>
  <script src="https://cdn.jsdelivr.net/npm/yuka@0.7.8/build/yuka.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
  <div id="top-bar">
    <span style="color:#4aee4a;font-size:11px;letter-spacing:0.1em;">MT EDITOR</span>
    <input class="config-url" id="config-input" type="text"
      placeholder="Config URL or path — e.g. https://scottgrocott.github.io/mt-games/drone-wars/v1/level-1.json"
      title="Press Enter to load">
    <button id="btn-load">⟳ Load</button>
    <button id="btn-audio">🔊 Audio</button>
    <button id="btn-freecam">F Free Cam</button>
    <button id="btn-editor">E Editor</button>
    <button id="btn-save">💾 Save</button>
    <button id="btn-deploy">🚀 Deploy</button>
  </div>
  <canvas id="renderCanvas"></canvas>
  <div id="crosshair"></div>
  <div id="hud">
    <div class="hud-row">
      <span class="hud-label">HP</span><span id="hud-health">100</span>
      <span class="hud-label">AMMO</span><span id="hud-ammo">∞</span>
      <span class="hud-label">ENEMIES</span><span id="hud-enemies">0</span>
    </div>
    <div class="hud-row"><span class="hud-label">POS</span><span id="hud-pos">0,0,0</span></div>
    <div class="hud-row"><span id="hud-status"></span></div>
  </div>
  <canvas id="minimap-canvas" width="220" height="220"></canvas>
  <div id="editor-hint">F = freecam / editor &nbsp;|&nbsp; ESC = pointer unlock</div>

  <script>
    // ── Splash stubs — editor has no splash screen ────────────────────────────
    window._setSplashContent = function(title) {
      document.title = (title || 'Metal Throne') + ' — Editor';
    };
    window._splashShowPlay = function() {};   // no-op — editor auto-plays

    // ── Audio unlock on first click anywhere ─────────────────────────────────
    document.addEventListener('click', function _unlock() {
      if (window.Tone?.start) window.Tone.start();
      document.dispatchEvent(new CustomEvent('splash-dismissed'));
      document.removeEventListener('click', _unlock);
    }, { once: true });

    // ── Config input bar — Enter or Load button ───────────────────────────────
    function _loadFromInput() {
      const val = document.getElementById('config-input').value.trim();
      if (!val) return;
      if (window._loadGameConfig) {
        window._loadGameConfig(val);
      } else {
        // Engine not ready yet — reload page with ?config= param
        location.href = location.pathname + '?config=' + encodeURIComponent(val);
      }
    }
    document.getElementById('config-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') _loadFromInput();
    });
    document.getElementById('btn-load').addEventListener('click', _loadFromInput);

    // ── Cursor: hide only when pointer is locked, show when released (Escape) ────
    const _canvas = document.getElementById('renderCanvas');
    document.addEventListener('pointerlockchange', () => {
      if (document.pointerLockElement === _canvas) {
        _canvas.classList.add('game-focus');     // locked → hide cursor
      } else {
        _canvas.classList.remove('game-focus');  // released → show cursor, can click editor
      }
    });
    // Click canvas to re-lock (only after splash dismissed)
    _canvas.addEventListener('click', () => {
      if (!document.pointerLockElement) _canvas.requestPointerLock();
    });

    // ── Pre-fill config input from ?config= param ─────────────────────────────
    const _cfgParam = new URLSearchParams(location.search).get('config');
    if (_cfgParam) document.getElementById('config-input').value = _cfgParam;

    // ── Engine loader ─────────────────────────────────────────────────────────
    const _s = document.createElement('script');
    _s.type = 'module';
    _s.src = location.hostname === 'localhost'
      ? 'http://localhost:83/mt-engine/main.js'
      : 'https://scottgrocott.github.io/mt-engine/main.js';
    document.currentScript.after(_s);
  </script>
</body>
</html>
